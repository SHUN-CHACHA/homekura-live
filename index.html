<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>homeクラ 配信ポータル</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#0f0f0f;
color:white;
}

header{
background:#1f1f1f;
padding:20px;
text-align:center;
}

h1{
margin:0;
}

.stats{
text-align:center;
padding:10px;
font-size:18px;
}

.search{
text-align:center;
padding:10px;
}

.search input{
padding:10px;
width:300px;
border-radius:8px;
border:none;
font-size:16px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:20px;
padding:20px;
max-width:1400px;
margin:auto;
}

.card{
background:#1a1a1a;
border-radius:12px;
overflow:hidden;
box-shadow:0 0 10px rgba(0,0,0,0.6);
}

.card img{
width:100%;
}

.info{
padding:10px;
}

.name{
font-weight:bold;
margin-bottom:5px;
}

.title{
font-size:14px;
}

</style>
</head>

<body>

<header>
<h1>🏠 homeクラ 配信ポータル</h1>
<p>homeクラ参加者の最新動画</p>
</header>

<div class="stats">
表示数：<span id="count">0</span>
</div>

<div class="search">
<input id="search" placeholder="配信者検索">
</div>

<div id="grid" class="grid"></div>

<script>

const channels=[

{name:"まぐにぃ",id:"UCMP7QuS4suoONg47Nbi-wrg"},
{name:"じゃじゃーん菊地",id:"UCi2kiw8hMo0vMAh5lXiafug"},
{name:"さかいさんだー",id:"UCuk8ABJTVWiApYlEojW_QrA"},
{name:"Ｍさん",id:"UCGK0iFuXhfA5VnL64xiKEmQ"},
{name:"タツナミ先生",id:"UCedenULTLYf3DanflEXdRCQ"},
{name:"神近",id:"UCdLe2q91fJkN9GEyDvItp-w"},
{name:"しろくる",id:"UCle3bhQ-tZty8KNcACbUBZQ"},
{name:"たにし",id:"UCiC8VCiSLD3mxoO-QFKQnBQ"},
{name:"凸もり",id:"UCdN9GjPrqhcrzE27eWNNjxg"},
{name:"神宮寺ちゃんねる",id:"UCou8IVB8jJPk56H0farYQdA"},
{name:"カズクラ",id:"UCu3Mp1ZimtNvyA-bcfo9VrQ"},
{name:"たいたい",id:"UCds-nvoKCcvixVXJ_54QcbQ"},
{name:"岐阜のこみちん",id:"UCw4frqkotySLjJ_CFZR5-7w"},
{name:"ナナホシナナ",id:"UCncsOsnMBAAaYb6WidBYIDw"},
{name:"月成るくす",id:"UCP9rcDSyTRtnu8EsG2CmLMg"},
{name:"メッス",id:"UCkJeBcOPRBs5bri5B3sFgVg"},
{name:"よいよい",id:"UCzk-vAIbo3iVBGTNaJQS2qQ"},
{name:"うえまさ",id:"UCIBDdDXnViOgN5tCpfX7NOA"},
{name:"久那式リン",id:"UCPs7s2VlkwVWWpjcyjviINA"},
{name:"犬野はる",id:"UCVB16vOi24WElLNbbmOFFsA"},
{name:"珍珠花こまり",id:"UCSLCZ5uhCYUMQ9TG9Cs1ERQ"},
{name:"ぽこにゃん",id:"UCO06KZjWOe6b1tXrgzzakZA"},
{name:"KtR（こーたろー）",id:"UCuJVrV6spfu9QUP6Wr4fugA"}

];

const grid=document.getElementById("grid");

async function loadVideos(){

grid.innerHTML="";
let count=0;

for(const ch of channels){

try{

const rss=`https://www.youtube.com/feeds/videos.xml?channel_id=${ch.id}`;
const proxy=`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(rss)}`;

const res=await fetch(proxy);
const xmlText=await res.text();

const parser=new DOMParser();
const xml=parser.parseFromString(xmlText,"text/xml");

const entry=xml.querySelector("entry");

if(!entry) continue;

const title=entry.querySelector("title").textContent;
const videoId=entry.querySelector("yt\\:videoId").textContent;

const thumb=`https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`;

const card=`

<div class="card">

<a href="https://youtube.com/watch?v=${videoId}" target="_blank">

<img src="${thumb}">

<div class="info">

<div class="name">${ch.name}</div>

<div class="title">${title}</div>

</div>

</a>

</div>

`;

grid.innerHTML+=card;
count++;

}catch(e){
console.log("error",ch.name);
}

}

document.getElementById("count").innerText=count;

}

loadVideos();

setInterval(loadVideos,300000);

document.getElementById("search").addEventListener("input",function(){

const word=this.value.toLowerCase();

document.querySelectorAll(".card").forEach(card=>{

card.style.display=card.innerText.toLowerCase().includes(word)?"block":"none";

});

});

</script>

</body>
</html>
