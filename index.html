<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>homeクラ 配信ポータル　＠旬茶</title>

    <link rel="icon" href="https://shun-chacha.github.io/homekura-live/favicon.ico" type="image/x-icon">
    <link rel="icon" href="https://shun-chacha.github.io/homekura-live/icon.png" type="image/png" sizes="192x192">
    <link rel="apple-touch-icon" href="https://shun-chacha.github.io/homekura-live/apple-touch-icon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="homeクラ">
    <meta name="theme-color" content="#1f1f1f">

    <style>
        body { margin: 0; font-family: sans-serif; background: #0f0f0f; color: white; padding-bottom: 50px; }
        
        header { 
            background: #1f1f1f; 
            padding: 15px; 
            border-bottom: 2px solid #333; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-logo { height: 48px; width: auto; margin-bottom: 10px; }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-refresh-header {
            background: #28a745;
            color: #fff;
            border: none;
            padding: 6px 15px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-refresh-header:disabled { background: #555; opacity: 0.7; }

        #timer { font-size: 12px; color: #888; font-family: monospace; }
        .progress-container { width: 100%; height: 3px; background: #333; position: relative; overflow: hidden; }
        #progress-bar { width: 100%; height: 100%; background: #28a745; transition: width 1s linear; }

        /* アニメーション */
        @keyframes blink { 50% { opacity: 0.3; } }
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(40, 167, 69, 0); }
            100% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0); }
        }

        .live-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: #28a745;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            z-index: 10;
            animation: blink 1s infinite;
        }

        .section-title { max-width: 1400px; margin: 20px auto 10px; padding: 0 10px; font-size: 14px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 0 8px 20px; max-width: 1400px; margin: auto; }
        
        .card { background: #1a1a1a; border-radius: 8px; overflow: hidden; border: 1px solid #333; display: flex; flex-direction: column; position: relative; }
        .card.is-live { border-color: #28a745 !important; animation: pulse-green 2s infinite; }

        .delete-btn { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.6); color: #888; border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 14px; cursor: pointer; z-index: 11; }

        .thumb-wrap { position: relative; aspect-ratio: 16 / 9; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .thumb { width: 100%; height: 100%; object-fit: cover; }
        .thumb-bg { position: absolute; width: 100%; height: 100%; opacity: 0.3; filter: blur(20px); }
        .thumb-profile { width: 45%; height: auto; border-radius: 50%; position: relative; z-index: 2; border: 2px solid rgba(255,255,255,0.2); }
        
        .info { padding: 8px; }
        .name { font-weight: bold; font-size: 11px; margin-bottom: 2px; }
        .title { font-size: 11px; line-height: 1.2; height: 2.4em; overflow: hidden; color: #eee; }

        .btn-area { padding: 0 8px 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        .btn { display: block; text-align: center; text-decoration: none; font-size: 10px; padding: 5px 0; border-radius: 4px; color: white; background: #333; transition: 0.2s; }
        .btn:hover { opacity: 0.8; }
        .btn-yt { background: #c00; }
        .btn-tw { background: #9146FF; }
        .btn-dc { background: #5865F2; }
        .btn-tk { background: #010101; border: 1px solid #333; }
        .btn-ig { background: linear-gradient(45deg, #f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%); }
        .btn-reserve { background: #555; cursor: pointer; border: none; font-family: inherit; }
        .btn-reserve.active { background: #ffcc00; color: #000; font-weight: bold; }

        .admin-panel { max-width: 1400px; margin: 20px auto; padding: 15px; background: #1a1a1a; border-radius: 8px; border: 1px solid #333; }
        .input-group { display: flex; flex-wrap: wrap; gap: 8px; }
        .input-group input { background: #222; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; flex: 1; min-width: 140px; }
        .btn-add { background: #28a745; color: white; border: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; }

        @media (min-width: 768px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
            .name, .title { font-size: 14px; }
            .btn { font-size: 12px; }
        }
    </style>
</head>
<body>

<header>
    <img src="logo.png" alt="homeクラ" class="header-logo">
    <div class="header-controls">
        <button id="refresh-btn" class="btn-refresh-header" onclick="manualRefresh()">更新</button>
        <div id="timer">Next Update: --:--</div>
    </div>
</header>

<div class="progress-container">
    <div id="progress-bar"></div>
</div>

<div id="liveSection" style="display: none;">
    <div class="section-title" style="color:#28a745">🟢 配信中のメンバー</div>
    <div id="liveGrid" class="grid"></div>
</div>

<div id="upcomingSection" style="display: none;">
    <div class="section-title" style="color:#ffcc00">🟡 配信予定のメンバー</div>
    <div id="upcomingGrid" class="grid"></div>
</div>

<hr style="border: 0; border-top: 1px solid #222; margin: 20px 0;">

<div class="admin-panel">
    <div class="admin-header"><h3>➕ 配信者を追加する</h3></div>
    <div class="input-group">
        <input type="text" id="new-name" placeholder="名前">
        <input type="text" id="new-id" placeholder="YouTube ID">
        <input type="text" id="new-twitter" placeholder="X ID">
        <input type="text" id="new-twitch" placeholder="Twitch ID">
        <input type="text" id="new-tiktok" placeholder="TikTok ID">
        <input type="text" id="new-insta" placeholder="Instagram ID">
        <input type="text" id="new-discord" placeholder="Discord URL">
        <input type="color" id="new-color" value="#ffffff" style="width: 40px; height: 35px; border: none; cursor: pointer;">
        <button class="btn-add" onclick="addChannel()">追加</button>
    </div>
    <button style="background:none; border:none; color:#555; cursor:pointer; font-size:10px; margin-top:10px;" onclick="resetChannels()">初期状態に戻す</button>
</div>

<div class="section-title" style="color:#aaa">👥 メンバー一覧</div>
<div id="allGrid" class="grid"></div>

<script>
const API_KEY = 'AIzaSyDoy4uvy_4jXcpGw8fxTE33lFmBn18fAYY';

const defaultChannels = [
    {name:"まぐにぃ", id:"UCMP7QuS4suoONg47Nbi-wrg", twitterId:"maguro29", twitchId:"maguro29game", tiktokId:"", instaId:"", discordUrl:"https://discord.gg/bRuT74X7sS", color:"#ff9900"},
    {name:"じゃじゃーん菊地", id:"UCi2kiw8hMo0vMAh5lXiafug", twitterId:"kikuchidaisuke", twitchId:"", tiktokId:"jajakiku", instaId:"", discordUrl:"", color:"#ffff00"},
    {name:"さかいさんだー", id:"UCuk8ABJTVWiApYlEojW_QrA", twitterId:"Sakai_Thunder", twitchId:"", tiktokId:"", instaId:"", discordUrl:"", color:"#ff00ff"},

    {name:"タツナミ先生", id:"UCedenULTLYf3DanflEXdRCQ", twitterId:"tatsunami", twitchId:"", tiktokId:"", instaId:"", discordUrl:"", color:"#00ff00"},

    {name:"凸もり", id:"UCdN9GjPrqhcrzE27eWNNjxg", twitterId:"mk_2_totsu", twitchId:"totsumori", tiktokId:"", instaId:"", discordUrl:"", color:"#888888"},
    {name:"神宮寺ちゃんねる", id:"UCou8IVB8jJPk56H0farYQdA", twitterId:"jinguji777ch", twitchId:"", tiktokId:"", instaId:"", discordUrl:"", color:"#ff0000"},

    {name:"ナナホシナナ", id:"UCncsOsnMBAAaYb6WidBYIDw", twitterId:"nanahoshinana77", twitchId:"nanahoshinana77", tiktokId:"", instaId:"", discordUrl:"", color:"#ff33ff"},
    {name:"月成るくす", id:"UCP9rcDSyTRtnu8EsG2CmLMg", twitterId:"Tsukinari_Lux_", twitchId:"", tiktokId:"", instaId:"tsukinarilux", discordUrl:"", color:"#ffffcc"},
    {name:"メッス", id:"UCkJeBcOPRBs5bri5B3sFgVg", twitterId:"messu_009", twitchId:"", tiktokId:"", instaId:"", discordUrl:"", color:"#333333"},
    {name:"よいよい", id:"UCzk-vAIbo3iVBGTNaJQS2qQ", twitterId:"yoiy0i", twitchId:"", tiktokId:"", instaId:"", discordUrl:"", color:"#ccff00"},
    {name:"うえまさ", id:"UCIBDdDXnViOgN5tCpfX7NOA", twitterId:"uema5aCh", twitchId:"", tiktokId:"", instaId:"uema5a", discordUrl:"", color:"#9900ff"},
    {name:"久那式リン", id:"UCPs7s2VlkwVWWpjcyjviINA", twitterId:"Kunashiki_Lin_", twitchId:"", tiktokId:"", instaId:"", discordUrl:"", color:"#ffffff"},
    {name:"犬野はる", id:"UCVB16vOi24WElLNbbmOFFsA", twitterId:"VT_InunoHaru", twitchId:"", tiktokId:"", instaId:"", discordUrl:"", color:"#ccffcc"},
    {name:"珍珠花こまり", id:"UCSLCZ5uhCYUMQ9TG9Cs1ERQ", twitterId:"komari_yuki", twitchId:"", tiktokId:"", instaId:"", discordUrl:"", color:"#ffffff"},
    {name:"ぽこにゃん", id:"UCO06KZjWOe6b1tXrgzzakZA", twitterId:"pokonyan1185", twitchId:"", tiktokId:"", instaId:"", discordUrl:"", color:"#00ff00"},
    {name:"KtR（こーたろー）", id:"UCuJVrV6spfu9QUP6Wr4fugA", twitterId:"HAOKtR", twitchId:"", tiktokId:"", instaId:"", discordUrl:"", color:"#3399ff"}
];

let channels = [];
let reservedVideos = JSON.parse(localStorage.getItem('reserved_videos') || '[]');
const UPDATE_INTERVAL = 600;
let timeLeft = UPDATE_INTERVAL;

function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function initChannels() {
    const saved = localStorage.getItem('custom_channels');
    channels = saved ? JSON.parse(saved) : [...defaultChannels];
}

function toggleReserve(videoId, channelName) {
    if (Notification.permission !== "granted") Notification.requestPermission();
    const index = reservedVideos.indexOf(videoId);
    if (index > -1) reservedVideos.splice(index, 1);
    else reservedVideos.push(videoId);
    localStorage.setItem('reserved_videos', JSON.stringify(reservedVideos));
    loadPortal();
}

function checkNotifications(vData) {
    if (!vData.items) return;
    vData.items.forEach(v => {
        if (v.snippet.liveBroadcastContent === 'live' && reservedVideos.includes(v.id)) {
            new Notification("配信開始！", {
                body: `${v.snippet.channelTitle}さんの配信が始まりました！`,
                icon: v.snippet.thumbnails.default.url
            });
            reservedVideos = reservedVideos.filter(id => id !== v.id);
            localStorage.setItem('reserved_videos', JSON.stringify(reservedVideos));
        }
    });
}

// SNSボタン生成の共通ロジック
function getSnsButtonsHtml(ch) {
    const snsConfigs = [
        { key: 'twitterId', url: 'https://x.com/', label: 'X', class: '' },
        { key: 'twitchId', url: 'https://twitch.tv/', label: 'Twitch', class: 'btn-tw' },
        { key: 'tiktokId', url: 'https://tiktok.com/', label: 'TikTok', class: 'btn-tk', prefix: '@' },
        { key: 'instaId', url: 'https://instagram.com/', label: 'Insta', class: 'btn-ig' },
        { key: 'discordUrl', url: '', label: 'Discord', class: 'btn-dc', isFull: true }
    ];

    return snsConfigs.map(sns => {
        let val = ch[sns.key];
        if (!val) return '';
        if (sns.key === 'tiktokId' && !val.startsWith('@')) val = '@' + val;
        const href = sns.isFull ? val : sns.url + val;
        return `<a href="${escapeHtml(href)}" target="_blank" class="btn ${sns.class}">${sns.label}</a>`;
    }).join('');
}

async function loadPortal() {
    if (channels.length === 0) return;
    let channelInfoMap = {};
    const channelIds = channels.map(c => c.id).join(',');

    try {
        const chRes = await fetch(`https://www.googleapis.com/youtube/v3/channels?key=${API_KEY}&id=${channelIds}&part=snippet`);
        const chData = await chRes.json();
        if (chData.items) {
            chData.items.forEach(item => {
                channelInfoMap[item.id] = { icon: item.snippet.thumbnails.medium.url };
            });
        }

        const playlistResults = await Promise.all(
            channels.map(ch => {
                const playlistId = ch.id.replace(/^UC/, 'UU');
                return fetch(`https://www.googleapis.com/youtube/v3/playlistItems?key=${API_KEY}&playlistId=${playlistId}&part=snippet&maxResults=1`)
                    .then(r => r.json())
                    .then(data => ({ chId: ch.id, data }))
                    .catch(() => ({ chId: ch.id, data: null }));
            })
        );

        const videoIds = [];
        playlistResults.forEach(({ chId, data }) => {
            if (data && data.items && data.items.length > 0) {
                const vId = data.items[0].snippet.resourceId.videoId;
                videoIds.push(vId);
                if (channelInfoMap[chId]) channelInfoMap[chId].lastVideoId = vId;
            }
        });

        const vRes = await fetch(`https://www.googleapis.com/youtube/v3/videos?key=${API_KEY}&id=${videoIds.join(',')}&part=snippet,liveStreamingDetails`);
        const vData = await vRes.json();
        checkNotifications(vData);

        let liveHtml = "", upcomingHtml = "", allHtml = "";
        let liveCount = 0, upcomingCount = 0;

        channels.forEach(ch => {
            const chInfo = channelInfoMap[ch.id];
            if (!chInfo) return;

            const vItem = vData.items ? vData.items.find(v => v.id === chInfo.lastVideoId) : null;
            const status = vItem ? vItem.snippet.liveBroadcastContent : 'none';
            const isLive = status === 'live';
            const isUpcoming = status === 'upcoming';
            const isReserved = reservedVideos.includes(chInfo.lastVideoId);

            let timeStr = "OFFLINE";
            if (isLive) timeStr = escapeHtml(vItem.snippet.title);
            else if (isUpcoming) {
                const d = new Date(vItem.liveStreamingDetails.scheduledStartTime);
                timeStr = `🕒 ${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}～`;
            }

            const mediaHtml = (isLive || isUpcoming)
                ? `${isLive ? '<div class="live-badge">LIVE</div>' : ''}<img class="thumb" src="${escapeHtml(vItem.snippet.thumbnails.medium.url)}">`
                : `<div class="thumb-bg" style="background: ${escapeHtml(ch.color)}"></div><img class="thumb-profile" src="${escapeHtml(chInfo.icon)}">`;

            const cardHtml = `
            <div class="card ${isLive ? 'is-live' : ''}">
                <button class="delete-btn" onclick="deleteChannel('${escapeHtml(ch.id)}')">×</button>
                <a href="https://youtube.com/watch?v=${escapeHtml(chInfo.lastVideoId || '')}" target="_blank" style="text-decoration:none; color:inherit;">
                    <div class="thumb-wrap">${mediaHtml}</div>
                    <div class="info">
                        <div class="name" style="color:${escapeHtml(ch.color)}">${escapeHtml(ch.name)}</div>
                        <div class="title">${timeStr}</div>
                    </div>
                </a>
                <div class="btn-area">
                    <a href="https://youtube.com/channel/${escapeHtml(ch.id)}" target="_blank" class="btn btn-yt">YouTube</a>
                    ${getSnsButtonsHtml(ch)}
                    ${isUpcoming ? `<button class="btn btn-reserve ${isReserved ? 'active' : ''}" style="grid-column: span 2;" onclick="toggleReserve('${escapeHtml(chInfo.lastVideoId)}', '${escapeHtml(ch.name)}')">${isReserved ? '🔔 予約中' : '🔔 通知予約'}</button>` : ''}
                </div>
            </div>`;

            if (isLive) { liveHtml += cardHtml; liveCount++; }
            else if (isUpcoming) { upcomingHtml += cardHtml; upcomingCount++; }
            allHtml += cardHtml;
        });

        document.getElementById("liveSection").style.display = liveCount > 0 ? "block" : "none";
        document.getElementById("liveGrid").innerHTML = liveHtml;
        document.getElementById("upcomingSection").style.display = upcomingCount > 0 ? "block" : "none";
        document.getElementById("upcomingGrid").innerHTML = upcomingHtml;
        document.getElementById("allGrid").innerHTML = allHtml;

    } catch (e) { console.error("Error loading portal:", e); }
}

function addChannel() {
    const getVal = (id) => document.getElementById(id).value.trim();
    const name = getVal('new-name'), id = getVal('new-id');
    if (!name || !id) return;

    channels.push({
        name, id, 
        twitterId: getVal('new-twitter'), 
        twitchId: getVal('new-twitch'), 
        tiktokId: getVal('new-tiktok'), 
        instaId: getVal('new-insta'), 
        discordUrl: getVal('new-discord'), 
        color: document.getElementById('new-color').value
    });

    localStorage.setItem('custom_channels', JSON.stringify(channels));
    loadPortal();

    ['new-name', 'new-id', 'new-twitter', 'new-twitch', 'new-tiktok', 'new-insta', 'new-discord'].forEach(id => document.getElementById(id).value = "");
    document.getElementById('new-color').value = "#ffffff";
}

function deleteChannel(id) {
    if (confirm("削除しますか？")) {
        channels = channels.filter(ch => ch.id !== id);
        localStorage.setItem('custom_channels', JSON.stringify(channels));
        loadPortal();
    }
}

function resetChannels() {
    if (confirm("リセットしますか？")) {
        localStorage.removeItem('custom_channels');
        channels = [...defaultChannels];
        loadPortal();
    }
}

async function manualRefresh() {
    const btn = document.getElementById('refresh-btn');
    btn.disabled = true;
    await loadPortal();
    timeLeft = UPDATE_INTERVAL;
    btn.disabled = false;
}

function updateTimerDisplay() {
    const bar = document.getElementById('progress-bar');
    const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
    document.getElementById('timer').innerText = `Next Update: ${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    bar.style.width = `${(timeLeft / UPDATE_INTERVAL) * 100}%`;
    bar.style.background = timeLeft < 60 ? "#1e7e34" : "#28a745";
}

initChannels();
loadPortal();
setInterval(() => {
    timeLeft--;
    if (timeLeft < 0) { loadPortal(); timeLeft = UPDATE_INTERVAL; }
    updateTimerDisplay();
}, 1000);
</script>
</body>
</html>
