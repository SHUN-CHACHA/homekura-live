async function fetchVideoData(channel) {
    // 検索APIを使用して、そのチャンネルで最新の「ライブ中またはアップロード動画」を取得
    const url = `https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&channelId=${channel.id}&part=snippet&order=date&maxResults=1&type=video`;

    try {
        const res = await fetch(url);
        const data = await res.json();

        if (data.items && data.items.length > 0) {
            const item = data.items[0];
            const videoId = item.id.videoId;
            const title = item.snippet.title;
            const thumb = item.snippet.thumbnails.high.url;
            const liveBroadcastContent = item.snippet.liveBroadcastContent; // "live" なら配信中

            return `
                <div class="card">
                    <a href="https://youtube.com/watch?v=${videoId}" target="_blank">
                        <img class="thumb" src="${thumb}" alt="${channel.name}">
                        <div class="info">
                            <span class="live-badge">${liveBroadcastContent === 'live' ? '● ライブ配信中' : ''}</span>
                            <div class="name">${channel.name}</div>
                            <div class="title">${title}</div>
                        </div>
                    </a>
                </div>
            `;
        }
    } catch (e) {
        console.error("API取得失敗:", channel.name);
    }
    return "";
}
