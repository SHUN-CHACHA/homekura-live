<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>homeクラ 配信ポータル</title>

<style>
body{
background:#111;
color:white;
font-family:sans-serif;
text-align:center;
margin:0;
}

header{
background:#1f1f1f;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#1c1c1c;
border-radius:10px;
padding:10px;
}

iframe{
width:100%;
height:180px;
border:none;
border-radius:8px;
}

</style>
</head>

<body>

<header>
<h1>🏠 homeクラ 配信ポータル</h1>
<p>このサーバーに参加している配信者のYouTubeライブ一覧</p>
</header>

<div class="grid">

<div class="card"><h3>まぐにぃ</h3><iframe src="https://www.youtube.com/embed/live_stream?channel=@ゲームまぐにぃ"></iframe></div>

<div class="card"><h3>じゃじゃーん菊地</h3><iframe src="https://www.youtube.com/embed/live_stream?channel=@jajakiku"></iframe></div>

<div class="card"><h3>さかいさんだー</h3><iframe src="https://www.youtube.com/embed/live_stream?channel=@Sakai_Thunder"></iframe></div>

</div>

</body>
</html>
