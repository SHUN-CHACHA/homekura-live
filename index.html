<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>homeクラ 配信ポータル　＠旬茶</title>

    <link rel="icon" href="https://shun-chacha.github.io/homekura-live/favicon.ico" type="image/x-icon">
    <link rel="icon" href="https://shun-chacha.github.io/homekura-live/icon.png" type="image/png" sizes="192x192">
    <link rel="apple-touch-icon" href="https://shun-chacha.github.io/homekura-live/apple-touch-icon.png">

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

    <style>
        :root {
            --bg-color: #0f0f0f;
            --header-bg: rgba(31, 31, 31, 0.7);
            --card-bg: rgba(26, 26, 26, 0.85);
            --text-color: #ffffff;
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-green: #28a745;
            --accent-yellow: #ffcc00;
            --accent-blue: #00aaff;
            --secondary-text: rgba(255, 255, 255, 0.6);
            --bg-image: none;
        }

        body { 
            margin: 0; font-family: sans-serif; 
            background-color: var(--bg-color);
            background-image: var(--bg-image);
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: var(--text-color); 
            padding-bottom: 50px; 
            transition: background 0.3s, color 0.3s; 
        }
        
        .content-overlay { min-height: 100vh; background: rgba(0, 0, 0, 0.1); }

        header { 
            background: var(--header-bg); padding: 15px; border-bottom: 1px solid var(--border-color); 
            display: flex; flex-direction: column; align-items: center; 
            position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px);
        }

        .header-top { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; }
        .header-logo { height: 48px; width: auto; }
        
        #roulette-link {
            text-decoration: none; font-size: 14px; font-weight: bold; color: var(--text-color);
            transition: opacity 0.2s; display: flex; align-items: center; gap: 5px;
        }
        #roulette-link:hover { opacity: 0.7; }

        .header-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .btn-tool {
            background: var(--accent-green); color: #fff !important; border: none; padding: 6px 15px; border-radius: 4px;
            font-size: 13px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }

        #timer { font-size: 12px; color: inherit; opacity: 0.7; font-family: monospace; }
        .progress-container { width: 100%; height: 3px; background: rgba(128,128,128,0.2); position: relative; overflow: hidden; }
        #progress-bar { width: 100%; height: 100%; background: var(--accent-green); transition: width 1s linear; }

        .section-title { 
            max-width: 1400px; margin: 20px auto 10px; padding: 0 10px; font-size: 14px; font-weight: bold; 
            text-shadow: 1px 1px 1px rgba(0,0,0,0.8), -1px -1px 1px rgba(0,0,0,0.8);
        }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 0 8px 20px; max-width: 1400px; margin: auto; }
        .list-container { display: flex; flex-direction: column; gap: 8px; padding: 0 8px 20px; max-width: 1400px; margin: auto; }
        
        .card { 
            background: var(--card-bg); border-radius: 8px; overflow: hidden; 
            border: 1px solid var(--border-color); display: flex; flex-direction: column; 
            position: relative; transition: transform 0.2s; touch-action: pan-y; backdrop-filter: blur(5px);
        }
        .card.is-live { border-color: var(--accent-green) !important; box-shadow: 0 0 15px rgba(40,167,69,0.3); }
        .card.is-new { border-color: var(--accent-blue) !important; }

        .row-item {
            background: var(--card-bg); border-radius: 8px; padding: 10px;
            display: flex; flex-direction: column; gap: 8px; border: 1px solid var(--border-color);
            position: relative; backdrop-filter: blur(5px);
        }

        .row-top { display: flex; align-items: center; gap: 10px; }
        .row-bottom { display: flex; align-items: center; justify-content: space-between; gap: 10px; }

        .drag-handle {
            width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.3); color: #fff; border-radius: 4px; cursor: grab; font-size: 16px; flex-shrink: 0;
        }

        .thumb-wrap { position: relative; aspect-ratio: 16 / 9; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #000; }
        .thumb { width: 100%; height: 100%; object-fit: cover; }
        .thumb-bg { position: absolute; width: 100%; height: 100%; opacity: 0.3; filter: blur(20px); }
        .thumb-profile { width: 45%; height: auto; border-radius: 50%; position: relative; z-index: 2; border: 2px solid rgba(255,255,255,0.2); }
        
        .mini-icon { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 1px solid rgba(255,255,255,0.2); flex-shrink: 0; }
        .row-name { font-weight: bold; font-size: 15px; flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .badge-new { position: absolute; top: 8px; left: 40px; background: var(--accent-blue); color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; z-index: 10; }
        .badge-live { position: absolute; top: 8px; left: 40px; background: var(--accent-green); color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; z-index: 10; }

        .info { padding: 8px; flex-grow: 1; }
        .name { font-weight: bold; font-size: 11px; margin-bottom: 2px; }
        .title { font-size: 11px; line-height: 1.2; height: 2.4em; overflow: hidden; color: inherit; }

        .btn-area { padding: 0 8px 8px; display: flex; flex-wrap: wrap; gap: 4px; }
        .row-btns { display: flex; gap: 4px; flex-wrap: wrap; flex-grow: 1; }
        
        .btn { flex: 1; min-width: 60px; text-align: center; text-decoration: none; font-size: 10px; padding: 5px 0; border-radius: 4px; color: white !important; background: #333; }
        .btn-mini { min-width: 40px; height: 32px; display: flex; align-items: center; justify-content: center; padding: 0 8px; font-weight: bold; font-size: 11px; }
        .btn-yt { background: #c00; }
        .btn-tw { background: #6441a5; }
        .btn-insta { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%); }
        .btn-tiktok { background: #000; border: 1px solid #444; }
        .btn-discord { background: #5865F2; }

        .btn-reserve { flex-basis: 100%; transition: background 0.3s; }
        .btn-reserve.active { background: var(--accent-blue); }

        .delete-btn-row { background: rgba(217, 83, 79, 0.2); color: #fff; border: 1px solid #d9534f; border-radius: 4px; width: 32px; height: 32px; cursor: pointer; font-size: 18px; flex-shrink: 0; }

        .admin-panel { max-width: 1400px; margin: 30px auto; padding: 15px; background: var(--card-bg); border-radius: 8px; border: 1px solid var(--border-color); backdrop-filter: blur(10px); color: inherit; }
        .input-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; align-items: center; }
        .input-group input[type="text"], .input-group input[type="file"] { background: rgba(128,128,128,0.1); border: 1px solid var(--border-color); color: inherit; padding: 8px; border-radius: 4px; flex: 1; min-width: 120px; font-size: 13px; }

        @media (min-width: 768px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
            .btn-mini { min-width: 50px; font-size: 12px; }
        }
    </style>
</head>
<body>

<div class="content-overlay">
<header>
    <div class="header-top">
        <img src="logo.png" alt="homeクラ" class="header-logo">
        <a href="https://shun-chacha.github.io/homekura-live/roulette.html" id="roulette-link" target="_blank">
            <img src="roulette-icon.png" alt="" style="width: 24px; height: 24px;">
            旬茶作　ルーレット

    </div>
    <div class="header-controls">

<div class="progress-container">

</div>

<div id="liveSection" style="display: none;">

    <div id="liveGrid" class="grid"></div>
</div>

<div id="upcomingSection" style="display: none;">

    <div id="upcomingGrid" class="grid"></div>
</div>

<div id="newSection" style="display: none;">
    <div class="section-title" style="color:var(--accent-blue)">🎬 【24時間以内の新着（動画・ショート）】</div>
    <div id="newGrid" class="grid"></div>
</div>

<div class="admin-panel">
    <h3 style="font-size: 16px; margin-top: 0;">🎨 デザイン・配信者設定</h3>
    <div class="input-group">
        <label style="font-size: 12px;">背景色: <input type="color" id="bg-color-picker" oninput="applyDesign()"></label>
        <input type="file" id="bg-file-input" accept="image/*" onchange="handleFileSelect(this)">
        <input type="text" id="bg-image-url" placeholder="画像URLで指定" onchange="applyDesign()">
        <button class="btn-tool" style="background:#d9534f" onclick="clearBgImage()">背景消去</button>
        <button class="btn-tool" style="background:#555" onclick="resetDesign()">全リセット</button>
    </div>
    <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 20px 0;">
    <h4 style="font-size: 14px; margin-bottom: 10px;">➕ 配信者を追加</h4>
    <div class="input-group">
        <input type="text" id="new-name" placeholder="名前">
        <input type="text" id="new-id" placeholder="YouTube ID (UC〜)">
        <input type="text" id="new-twitter" placeholder="X ID">
        <input type="text" id="new-twitch" placeholder="Twitch ID">
    </div>
    <div class="input-group">
        <input type="text" id="new-tiktok" placeholder="TikTok ID">
        <input type="text" id="new-insta" placeholder="Insta ID">
        <input type="text" id="new-discord" placeholder="Discord URL">
        <input type="color" id="new-color" value="#ffffff" style="width: 40px; height: 38px;">
        <button class="btn-tool" onclick="addChannel()">追加</button>
    </div>
</div>

<div class="section-title">👥 メンバー一覧 (⠿で並び替え)</div>
<div id="allList" class="list-container"></div>
</div>

<script src="config.js"></script>

    {name:"珍珠花こまり", id:"UCSLCZ5uhCYUMQ9TG9Cs1ERQ", twitterId:"komari_yuki", twitchId:"", tiktokId:"", instaId:"", discordUrl:"", color:"#ffffff"},
    {name:"ぽこにゃん", id:"UCO06KZjWOe6b1tXrgzzakZA", twitterId:"pokonyan1185", twitterId:"", tiktokId:"", instaId:"", discordUrl:"", color:"#00ff00"},
    {name:"KtR（こーたろー）", id:"UCuJVrV6spfu9QUP6Wr4fugA", twitterId:"HAOKtR", twitchId:"", tiktokId:"", instaId:"", discordUrl:"", color:"#3399ff"}
];

let channels = [];
let reservedVideos = JSON.parse(localStorage.getItem('reserved_videos') || '[]');
let timeLeft = 600;

function handleFileSelect(input) {
    const file = input.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = e => {
            const b64 = e.target.result;
            document.documentElement.style.setProperty('--bg-image', `url('${b64}')`);
            localStorage.setItem('custom_bg_image', b64);
        };
        reader.readAsDataURL(file);
    }
}

function applyDesign() {
    const color = document.getElementById('bg-color-picker').value;
    const url = document.getElementById('bg-image-url').value.trim();
    document.documentElement.style.setProperty('--bg-color', color);
    const r = parseInt(color.substring(1,3), 16), g = parseInt(color.substring(3,5), 16), b = parseInt(color.substring(5,7), 16);
    const textColor = (r*299 + g*587 + b*114) / 1000 > 128 ? '#000000' : '#ffffff';
    document.documentElement.style.setProperty('--text-color', textColor);
    const isDark = textColor === '#ffffff';
    document.documentElement.style.setProperty('--secondary-text', isDark ? 'rgba(255,255,255,0.6)' : 'rgba(0,0,0,0.6)');
    document.documentElement.style.setProperty('--border-color', isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)');
    document.documentElement.style.setProperty('--header-bg', isDark ? 'rgba(31,31,31,0.7)' : 'rgba(255,255,255,0.7)');
    document.documentElement.style.setProperty('--card-bg', isDark ? 'rgba(26,26,26,0.85)' : 'rgba(255,255,255,0.85)');
    localStorage.setItem('custom_bg_color', color);
    if (url) {
        document.documentElement.style.setProperty('--bg-image', `url('${url}')`);
        localStorage.setItem('custom_bg_image', url);
    }
}

function clearBgImage() {
    localStorage.removeItem('custom_bg_image');
    document.documentElement.style.setProperty('--bg-image', 'none');
}

function resetDesign() { 
    if(confirm("デザイン設定をリセットしますか？")) { 
        const tempChannels = localStorage.getItem('custom_channels');
        const tempReserved = localStorage.getItem('reserved_videos');
        localStorage.clear(); 
        if (tempChannels) localStorage.setItem('custom_channels', tempChannels);
        if (tempReserved) localStorage.setItem('reserved_videos', tempReserved);
        location.reload(); 
    } 
}

function init() {
    if ("Notification" in window && Notification.permission !== "granted") {
        Notification.requestPermission();
    }
    const savedColor = localStorage.getItem('custom_bg_color') || '#0f0f0f';
    const savedImage = localStorage.getItem('custom_bg_image') || '';
    document.getElementById('bg-color-picker').value = savedColor;
    applyDesign();
    if(savedImage) document.documentElement.style.setProperty('--bg-image', `url('${savedImage}')`);
    const saved = localStorage.getItem('custom_channels');
    channels = saved ? JSON.parse(saved) : [...defaultChannels];
    new Sortable(document.getElementById('allList'), {
        animation: 150, handle: '.drag-handle',
        onEnd: () => {
            const newOrder = [];
            document.querySelectorAll('#allList .row-item').forEach(el => {
                const ch = channels.find(c => c.id === el.getAttribute('data-id'));
                if(ch) newOrder.push(ch);
            });
            channels = newOrder;
            localStorage.setItem('custom_channels', JSON.stringify(channels));
        }
    });
    loadPortal();
    setInterval(checkNotifications, 30000); // 30秒ごとに通知チェック
}

async function loadPortal() {
    if (!channels.length) return;
    const channelIds = channels.map(c => c.id).join(',');
    try {
        const chRes = await fetch(`https://www.googleapis.com/youtube/v3/channels?key=${API_KEY}&id=${channelIds}&part=snippet`);
        const chData = await chRes.json();
        const chInfoMap = {};
        chData.items?.forEach(i => chInfoMap[i.id] = { icon: i.snippet.thumbnails.medium.url });
        const playlistResults = await Promise.all(
            channels.map(ch => {
                const pId = ch.id.replace(/^UC/, 'UU');
                return fetch(`https://www.googleapis.com/youtube/v3/playlistItems?key=${API_KEY}&playlistId=${pId}&part=snippet&maxResults=1`)
                    .then(r => r.json()).catch(() => null);
            })
        );
        const videoIds = playlistResults.map(r => r?.items?.[0]?.snippet.resourceId.videoId).filter(Boolean);
        const vRes = await fetch(`https://www.googleapis.com/youtube/v3/videos?key=${API_KEY}&id=${videoIds.join(',')}&part=snippet,liveStreamingDetails`);
        const vData = await vRes.json();
        renderGrids(chInfoMap, vData.items || []);
    } catch (e) { console.error(e); }
}

function renderGrids(chInfoMap, vItems) {
    let htmls = { live: "", new: "", upcoming: "", all: "" };
    let counts = { live: 0, new: 0, upcoming: 0 };
    const now = new Date();
    channels.forEach(ch => {
        const chInfo = chInfoMap[ch.id]; if (!chInfo) return;
        const lastV = vItems.find(v => v.snippet.channelId === ch.id);
        const status = lastV?.snippet.liveBroadcastContent || 'none';
        const isLive = status === 'live';
        const isUpcoming = status === 'upcoming';
        const pubDate = lastV ? new Date(lastV.snippet.publishedAt) : null;
        const isNew = lastV && !isLive && !isUpcoming && (now - pubDate < 24 * 60 * 60 * 1000);
        const isShorts = lastV && (lastV.snippet.title.includes('#Shorts') || lastV.snippet.description.includes('#Shorts'));
        let timeStr = "OFFLINE";
        let startTime = null;

        if (isLive) {
            timeStr = lastV.snippet.title;
        } else if (isUpcoming) {
            if (lastV.liveStreamingDetails && lastV.liveStreamingDetails.scheduledStartTime) {
                startTime = lastV.liveStreamingDetails.scheduledStartTime;
                const d = new Date(startTime);
                timeStr = `🕒 ${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}～`;
            } else {
                timeStr = "🕒 配信予定（開始時間：未定）";
                startTime = null;
            }
        } else if (isNew) {
            timeStr = `🆕 新着: ${lastV.snippet.title}`;
        }

        const isReserved = reservedVideos.some(rv => rv.id === lastV?.id);
        let cardBtnsHtml = `<a href="https://youtube.com/channel/${ch.id}" target="_blank" class="btn btn-yt">YouTube</a>`;
        
        if (ch.twitterId) {
            cardBtnsHtml += `<a href="https://x.com/${ch.twitterId}" target="_blank" class="btn">X</a>`;
        }
        
        if (ch.twitchId) cardBtnsHtml += `<a href="https://twitch.tv/${ch.twitchId}" target="_blank" class="btn btn-tw">Twitch</a>`;
        if (ch.tiktokId) cardBtnsHtml += `<a href="https://www.tiktok.com/@${ch.tiktokId.replace('@','')}" target="_blank" class="btn btn-tiktok">TikTok</a>`;
        if (ch.instaId) cardBtnsHtml += `<a href="https://www.instagram.com/${ch.instaId}" target="_blank" class="btn btn-insta">Insta</a>`;
        if (ch.discordUrl) cardBtnsHtml += `<a href="${ch.discordUrl}" target="_blank" class="btn btn-discord">Discord</a>`;

        const card = `
        <div class="card ${isLive?'is-live':''} ${isNew?'is-new':''}" data-id="${ch.id}">
            <div class="drag-handle" style="position:absolute; top:5px; left:5px; z-index:20;">⠿</div>
            <a href="https://youtube.com/watch?v=${lastV?.id || ''}" target="_blank" style="text-decoration:none; color:inherit;">
                <div class="thumb-wrap ${isShorts?'is-shorts':''}">${(isLive || isUpcoming || isNew)
                    ? `${isLive ? '<div class="badge-live">LIVE</div>' : isNew ? '<div class="badge-new">NEW</div>' : ''}
                       <img class="thumb" src="${lastV.snippet.thumbnails.maxres?.url || lastV.snippet.thumbnails.medium.url}">`
                    : `<div class="thumb-bg" style="background:${ch.color}"></div><img class="thumb-profile" src="${chInfo.icon}">`}</div>
                <div class="info"><div class="name" style="color:${ch.color}">${ch.name}</div><div class="title">${timeStr}</div></div>
            </a>
            <div class="btn-area">
                ${cardBtnsHtml}
                ${(isUpcoming && startTime) ? `<button class="btn btn-reserve ${isReserved?'active':''}" onclick="toggleReserve('${lastV.id}', '${ch.name}', '${startTime}')">🔔 ${isReserved?'予約中':'通知予約'}</button>` : (isUpcoming && !startTime) ? `<button class="btn btn-reserve" disabled style="opacity:0.5; cursor:not-allowed;">🔔 通知不可(時間未定)</button>` : ''}
            </div>
        </div>`;

        let listBtnsHtml = `<a href="https://youtube.com/channel/${ch.id}" target="_blank" class="btn btn-mini btn-yt" title="YouTube">YT</a>`;
        if (ch.twitterId) listBtnsHtml += `<a href="https://x.com/${ch.twitterId}" target="_blank" class="btn btn-mini" title="X">X</a>`;
        if (ch.twitchId) listBtnsHtml += `<a href="https://twitch.tv/${ch.twitchId}" target="_blank" class="btn btn-mini btn-tw" title="Twitch">Tw</a>`;
        if (ch.tiktokId) listBtnsHtml += `<a href="https://www.tiktok.com/@${ch.tiktokId.replace('@','')}" target="_blank" class="btn btn-mini btn-tiktok" title="TikTok">Tk</a>`;
        if (ch.instaId) listBtnsHtml += `<a href="https://www.instagram.com/${ch.instaId}" target="_blank" class="btn btn-mini btn-insta" title="Instagram">In</a>`;
        if (ch.discordUrl) listBtnsHtml += `<a href="${ch.discordUrl}" target="_blank" class="btn btn-mini btn-discord" title="Discord">Dc</a>`;

        const row = `<div class="row-item" data-id="${ch.id}"><div class="row-top"><div class="drag-handle">⠿</div><img class="mini-icon" src="${chInfo.icon}"><div class="row-name" style="color:${ch.color}">${ch.name}</div></div><div class="row-bottom"><div class="row-btns">${listBtnsHtml}</div><button class="delete-btn-row" onclick="deleteChannel('${ch.id}')">×</button></div></div>`;
        
        if (isLive) { htmls.live += card; counts.live++; }
        else if (isNew) { htmls.new += card; counts.new++; }
        else if (isUpcoming) { htmls.upcoming += card; counts.upcoming++; }
        htmls.all += row;
    });
    document.getElementById("liveSection").style.display = counts.live ? "block" : "none";
    document.getElementById("liveGrid").innerHTML = htmls.live;
    document.getElementById("upcomingSection").style.display = counts.upcoming ? "block" : "none";
    document.getElementById("upcomingGrid").innerHTML = htmls.upcoming;
    document.getElementById("newSection").style.display = counts.new ? "block" : "none";
    document.getElementById("newGrid").innerHTML = htmls.new;
    document.getElementById("allList").innerHTML = htmls.all;
}

function toggleReserve(id, name, startTime) {
    const idx = reservedVideos.findIndex(rv => rv.id === id);
    if (idx > -1) reservedVideos.splice(idx, 1);
    else {
        reservedVideos.push({ id, name, startTime, notified: false });
        if (Notification.permission !== "granted") Notification.requestPermission();
    }
    localStorage.setItem('reserved_videos', JSON.stringify(reservedVideos));
    loadPortal();
}

function checkNotifications() {
    const now = new Date();
    let changed = false;
    reservedVideos.forEach(rv => {
        if (!rv.notified && new Date(rv.startTime) <= now) {
            new Notification("配信開始！", { body: `${rv.name}さんの配信が始まるよ！`, icon: "icon.png" });
            rv.notified = true;
            changed = true;
        }
    });
    if (changed) localStorage.setItem('reserved_videos', JSON.stringify(reservedVideos));
}

function addChannel() {
    const getVal = id => document.getElementById(id).value.trim();
    const name = getVal('new-name'), id = getVal('new-id');
    if (!name || !id) { alert("名前とYouTube IDは必須だよ！"); return; }
    channels.push({ name, id, twitterId: getVal('new-twitter'), twitchId: getVal('new-twitch'), tiktokId: getVal('new-tiktok'), instaId: getVal('new-insta'), discordUrl: getVal('new-discord'), color: document.getElementById('new-color').value });
    localStorage.setItem('custom_channels', JSON.stringify(channels));
    location.reload();
}

function deleteChannel(id) {
    if (confirm("リストから削除するよ？")) {
        channels = channels.filter(c => c.id !== id);
        localStorage.setItem('custom_channels', JSON.stringify(channels));
        loadPortal();
    }
}

function manualRefresh() { location.reload(); }
setInterval(() => {
    timeLeft--; if (timeLeft < 0) location.reload();
    document.getElementById('timer').innerText = `Next Update: ${String(Math.floor(timeLeft/60)).padStart(2,'0')}:${String(timeLeft%60).padStart(2,'0')}`;
    document.getElementById('progress-bar').style.width = (timeLeft/600)*100 + "%";
}, 1000);
init();
</script>
</body>
</html>
