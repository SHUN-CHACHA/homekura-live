<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>homeクラ 配信ポータル</title>
<style>
    body { margin: 0; font-family: sans-serif; background: #0f0f0f; color: white; padding-bottom: 50px; }
    header { background: #1f1f1f; padding: 10px 20px; text-align: center; border-bottom: 2px solid #333; height: 50px; display: flex; justify-content: center; align-items: center; }
    .header-logo { max-height: 100%; width: auto; }

    .section-title { max-width: 1400px; margin: 20px auto 10px; padding: 0 10px; font-size: 14px; font-weight: bold; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 0 8px 20px; max-width: 1400px; margin: auto; }
    
    .card { background: #1a1a1a; border-radius: 8px; overflow: hidden; border: 1px solid #333; display: flex; flex-direction: column; }
    
    /* 配信中のカード。後ほどJSで枠線の色を変えます */
    .card.is-live { box-shadow: 0 0 15px rgba(255,255,255,0.2); z-index: 5; }

    .thumb-wrap { position: relative; aspect-ratio: 16 / 9; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    
    /* 配信外：アイコンを浮かせるための背景 */
    .thumb-bg { position: absolute; width: 100%; height: 100%; opacity: 0.3; filter: blur(20px); }
    .thumb-profile { width: 45%; height: auto; border-radius: 50%; border: 2px solid rgba(255,255,255,0.5); position: relative; z-index: 2; }
    .thumb { width: 100%; height: 100%; object-fit: cover; }
    
    .info { padding: 6px; }
    .name { font-weight: bold; font-size: 10px; margin-bottom: 2px; }
    .title { font-size: 10px; line-height: 1.2; height: 2.4em; overflow: hidden; color: #eee; }

    .btn-area { padding: 0 6px 8px 6px; display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
    .btn { display: block; text-align: center; text-decoration: none; font-size: 9px; padding: 4px 0; border-radius: 4px; color: white; background: #333; }
    .btn-yt { background: #c00; }
    .btn-x { background: #000; }

    @media (min-width: 768px) {
        .grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .name { font-size: 14px; }
        .title { font-size: 14px; }
        .btn { font-size: 12px; }
    }
</style>
</head>
<body>

<header><img src="logo.png" alt="homeクラ" class="header-logo"></header>

<div id="liveSection" style="display: none;">
    <div class="section-title" style="color:#ff4444">🔴 配信中のメンバー</div>
    <div id="liveGrid" class="grid"></div>
</div>

<div class="section-title" style="color:#aaa">👥 メンバー一覧</div>
<div id="allGrid" class="grid"></div>

<script>
const API_KEY = 'AIzaSyDoy4uvy_4jXcpGw8fxTE33lFmBn18fAYY'; 

// color プロパティを追加しました
const channels = [
    {name:"まぐにぃ", id:"UCMP7QuS4suoONg47Nbi-wrg", twitterId:"maguro29", color:"#ff9900"},
    {name:"じゃじゃーん菊地", id:"UCi2kiw8hMo0vMAh5lXiafug", twitterId:"kikuchi_jaja", color:"#ffff00"},
    {name:"さかいさんだー", id:"UCuk8ABJTVWiApYlEojW_QrA", twitterId:"Sakai_Thunder", color:"#ff00ff"},
    {name:"Ｍさん", id:"UCGK0iFuXhfA5VnL64xiKEmQ", twitterId:"", color:"#00ffff"},
    {name:"タツナミ先生", id:"UCedenULTLYf3DanflEXdRCQ", twitterId:"tatsunami", color:"#00ff00"},
    {name:"神近", id:"UCdLe2q91fJkN9GEyDvItp-w", twitterId:"kamichika", color:"#ffffff"},
    {name:"しろくる", id:"UCle3bhQ-tZty8KNcACbUBZQ", twitterId:"4696_v_v", color:"#ffffff"},
    {name:"たにし", id:"UCiC8VCiSLD3mxoO-QFKQnBQ", twitterId:"tanishi_vrc", color:"#0000ff"},
    {name:"凸もり", id:"UCdN9GjPrqhcrzE27eWNNjxg", twitterId:"totsumori", color:"#888888"},
    {name:"神宮寺ちゃんねる", id:"UCou8IVB8jJPk56H0farYQdA", twitterId:"_jinguji", color:"#ff0000"},
    {name:"カズクラ", id:"UCu3Mp1ZimtNvyA-bcfo9VrQ", twitterId:"kazuch0924", color:"#ff0000"},
    {name:"たいたい", id:"UCds-nvoKCcvixVXJ_54QcbQ", twitterId:"taitaitatata", color:"#00ccff"},
    {name:"岐阜のこみちん", id:"UCw4frqkotySLjJ_CFZR5-7w", twitterId:"komichin_info", color:"#ffcc00"},
    {name:"ナナホシナナ", id:"UCncsOsnMBAAaYb6WidBYIDw", twitterId:"nanahoshi_nana", color:"#ff33ff"},
    {name:"月成るくす", id:"UCP9rcDSyTRtnu8EsG2CmLMg", twitterId:"tsukinari_lux", color:"#ffffcc"},
    {name:"メッス", id:"UCkJeBcOPRBs5bri5B3sFgVg", twitterId:"Messu_009", color:"#333333"},
    {name:"よいよい", id:"UCzk-vAIbo3iVBGTNaJQS2qQ", twitterId:"yoiyoi_v", color:"#ccff00"},
    {name:"うえまーさ", id:"UCIBDdDXnViOgN5tCpfX7NOA", twitterId:"uemasa_v", color:"#9900ff"},
    {name:"久那式リン", id:"UCPs7s2VlkwVWWpjcyjviINA", twitterId:"Kunashiki_Lin", color:"#ffffff"},
    {name:"犬野はる", id:"UCVB16vOi24WElLNbbmOFFsA", twitterId:"inuno_haru", color:"#ccffcc"},
    {name:"珍珠花こまり", id:"UCSLCZ5uhCYUMQ9TG9Cs1ERQ", twitterId:"chinjuhana", color:"#ffffff"},
    {name:"ぽこにゃん", id:"UCO06KZjWOe6b1tXrgzzakZA", twitterId:"pokonyan1185", color:"#00ff00"},
    {name:"KtR（こーたろー）", id:"UCuJVrV6spfu9QUP6Wr4fugA", twitterId:"KtR_game_", color:"#3399ff"}
];

async function loadPortal() {
    let videoIds = [];
    let channelInfoMap = {};
    const channelIds = channels.map(c => c.id).join(',');

    try {
        const chRes = await fetch(`https://www.googleapis.com/youtube/v3/channels?key=${API_KEY}&id=${channelIds}&part=snippet`);
        const chData = await chRes.json();
        chData.items.forEach(item => {
            channelInfoMap[item.id] = { icon: item.snippet.thumbnails.medium.url };
        });

        for (const ch of channels) {
            const playlistId = ch.id.replace(/^UC/, 'UU');
            const res = await fetch(`https://www.googleapis.com/youtube/v3/playlistItems?key=${API_KEY}&playlistId=${playlistId}&part=snippet&maxResults=1`);
            const data = await res.json();
            if (data.items && data.items.length > 0) {
                const vId = data.items[0].snippet.resourceId.videoId;
                videoIds.push(vId);
                Object.assign(channelInfoMap[ch.id], { lastVideoId: vId });
            }
        }

        const vRes = await fetch(`https://www.googleapis.com/youtube/v3/videos?key=${API_KEY}&id=${videoIds.join(',')}&part=snippet,liveStreamingDetails`);
        const vData = await vRes.json();
        
        let liveHtml = "", allHtml = "", liveCount = 0;

        channels.forEach(ch => {
            const chInfo = channelInfoMap[ch.id];
            const videoItem = vData.items.find(v => v.id === chInfo.lastVideoId);
            const isLive = videoItem && videoItem.snippet.liveBroadcastContent === 'live';
            
            // 配信中の時は枠線をその人の色に
            const borderStyle = isLive ? `style="border-color: ${ch.color}; box-shadow: 0 0 10px ${ch.color}55;"` : '';
            const nameStyle = `style="color: ${ch.color}"`;

            const mediaHtml = isLive 
                ? `<img class="thumb" src="${videoItem.snippet.thumbnails.medium.url}">`
                : `<div class="thumb-bg" style="background: ${ch.color}"></div><img class="thumb-profile" src="${chInfo.icon}">`;

            const cardHtml = `
            <div class="card ${isLive ? 'is-live' : ''}" ${borderStyle}>
                <a href="https://youtube.com/watch?v=${chInfo.lastVideoId}" target="_blank" class="video-link">
                    <div class="thumb-wrap">
                        ${mediaHtml}
                    </div>
                    <div class="info">
                        <div class="name" ${nameStyle}>${ch.name}</div>
                        <div class="title">${isLive ? videoItem.snippet.title : 'OFFLINE'}</div>
                    </div>
                </a>
                <div class="btn-area">
                    <a href="https://youtube.com/channel/${ch.id}" target="_blank" class="btn btn-yt">YouTube</a>
                    <a href="https://x.com/${ch.twitterId}" target="_blank" class="btn btn-x">X</a>
                </div>
            </div>`;
            
            if (isLive) { liveHtml += cardHtml; liveCount++; }
            allHtml += cardHtml;
        });

        document.getElementById("liveSection").style.display = liveCount > 0 ? "block" : "none";
        document.getElementById("liveGrid").innerHTML = liveHtml;
        document.getElementById("allGrid").innerHTML = allHtml;

    } catch (e) { console.error(e); }
}

loadPortal();
setInterval(loadPortal, 600000);
</script>
</body>
</html>
