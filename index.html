<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ほめクラLIVE</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:sans-serif;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#1b1b1b;
border-radius:10px;
padding:10px;
}

.thumb{
width:100%;
border-radius:8px;
}

.live{
color:#ff4444;
font-weight:bold;
}

button{
background:red;
border:none;
padding:10px;
color:white;
border-radius:6px;
}

</style>

</head>

<body>

<h1>ほめクラLIVE</h1>

<div class="grid" id="grid"></div>

<script>

streamers.forEach(s=>{

src="https://img.youtube.com/vi/dQw4w9WgXcQ/hqdefault.jpg">

</button>

});
