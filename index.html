<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>homeクラ 配信ポータル</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:sans-serif;
margin:0;
}

header{
background:#1f1f1f;
padding:20px;
text-align:center;
}

h1{
margin:0;
}

.search{
text-align:center;
padding:10px;
}

input{
padding:10px;
width:300px;
border-radius:8px;
border:none;
font-size:16px;
}

.section{
font-size:22px;
padding:10px 20px;
max-width:1500px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:20px;
padding:20px;
max-width:1500px;
margin:auto;
}

.card{
background:#1a1a1a;
border-radius:12px;
overflow:hidden;
box-shadow:0 0 10px rgba(0,0,0,0.6);
transition:0.2s;
}

.card:hover{
transform:translateY(-5px);
}

.thumb{
width:100%;
}

.info{
padding:10px;
}

.streamer{
display:flex;
align-items:center;
gap:10px;
font-weight:bold;
}

.icon{
width:32px;
height:32px;
border-radius:50%;
}

.title{
font-size:14px;
margin-top:6px;
}

.live{
color:#ff4444;
font-size:12px;
margin-left:6px;
}

.viewers{
font-size:12px;
opacity:0.8;
margin-top:4px;
}

.minecraft{
color:#00ff9d;
font-size:12px;
margin-left:6px;
}

</style>
</head>

<body>

<header>
<h1>🏠 homeクラ 配信ポータル</h1>
<p>homeクラ参加者のYouTube配信一覧</p>
</header>

<div class="search">
<input type="text" id="search" placeholder="配信者検索">
</div>

<div class="section">🔴 LIVE</div>
<div id="live" class="grid"></div>

<div class="section">🟡 配信予定</div>
<div id="upcoming" class="grid"></div>

<script>

const API_KEY="AIzaSyAj-96z_JFwqNr6Gl0d2p3UdDUHDk2wGEE";

const channels=[

{name:"まぐにぃ",id:"UCMP7QuS4suoONg47Nbi-wrg"},
{name:"じゃじゃーん菊地",id:"UCi2kiw8hMo0vMAh5lXiafug"},
{name:"さかいさんだー",id:"UCuk8ABJTVWiApYlEojW_QrA"},
{name:"Ｍさん",id:"UCGK0iFuXhfA5VnL64xiKEmQ"},
{name:"タツナミ先生",id:"UCedenULTLYf3DanflEXdRCQ"},
{name:"神近",id:"UCdLe2q91fJkN9GEyDvItp-w"},
{name:"しろくる",id:"UCle3bhQ-tZty8KNcACbUBZQ"},
{name:"たにし",id:"UCiC8VCiSLD3mxoO-QFKQnBQ"},
{name:"凸もり",id:"UCdN9GjPrqhcrzE27eWNNjxg"},
{name:"神宮寺ちゃんねる",id:"UCou8IVB8jJPk56H0farYQdA"},
{name:"カズクラ",id:"UCu3Mp1ZimtNvyA-bcfo9VrQ"},
{name:"たいたい",id:"UCds-nvoKCcvixVXJ_54QcbQ"},
{name:"岐阜のこみちん",id:"UCw4frqkotySLjJ_CFZR5-7w"},
{name:"ナナホシナナ",id:"UCncsOsnMBAAaYb6WidBYIDw"},
{name:"月成るくす",id:"UCP9rcDSyTRtnu8EsG2CmLMg"},
{name:"メッス",id:"UCkJeBcOPRBs5bri5B3sFgVg"},
{name:"よいよい",id:"UCzk-vAIbo3iVBGTNaJQS2qQ"},
{name:"うえまさ",id:"UCIBDdDXnViOgN5tCpfX7NOA"},
{name:"久那式リン",id:"UCPs7s2VlkwVWWpjcyjviINA"},
{name:"犬野はる",id:"UCVB16vOi24WElLNbbmOFFsA"},
{name:"珍珠花こまり",id:"UCSLCZ5uhCYUMQ9TG9Cs1ERQ"},
{name:"ぽこにゃん",id:"UCO06KZjWOe6b1tXrgzzakZA"},
{name:"KtR（こーたろー）",id:"UCuJVrV6spfu9QUP6Wr4fugA"}

];

const liveGrid=document.getElementById("live");
const upcomingGrid=document.getElementById("upcoming");

async function getViewers(videoId){

const url=`https://www.googleapis.com/youtube/v3/videos?part=liveStreamingDetails&id=${videoId}&key=${API_KEY}`;
const res=await fetch(url);
const data=await res.json();

if(data.items.length>0){
return data.items[0].liveStreamingDetails.concurrentViewers || "0";
}

return "0";

}

async function checkChannel(ch){

const url=`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${ch.id}&eventType=live&type=video&key=${API_KEY}`;
const res=await fetch(url);
const data=await res.json();

if(data.items.length>0){

const item=data.items[0];
const videoId=item.id.videoId;
const title=item.snippet.title;
const thumb=item.snippet.thumbnails.medium.url;

const viewers=await getViewers(videoId);

const card=document.createElement("div");
card.className="card";

const mc = title.toLowerCase().includes("minecraft") ? '<span class="minecraft">🎮Minecraft</span>' : "";

card.innerHTML=`

<a href="https://youtube.com/watch?v=${videoId}" target="_blank">

<img class="thumb" src="${thumb}">

<div class="info">

<div class="streamer">

<img class="icon" src="https://yt3.googleusercontent.com/ytc/APkrFKZ">

${ch.name}
<span class="live">LIVE</span>
${mc}

</div>

<div class="title">${title}</div>
<div class="viewers">👀 ${viewers} 人視聴中</div>

</div>

</a>

`;

liveGrid.appendChild(card);

}

}

async function loadStreams(){

liveGrid.innerHTML="";

for(const ch of channels){

await checkChannel(ch);

}

}

loadStreams();
setInterval(loadStreams,30000);

document.getElementById("search").addEventListener("input",function(){

const word=this.value.toLowerCase();
const cards=document.querySelectorAll(".card");

cards.forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(word)?"block":"none";
});

});

</script>

</body>
</html>
