header{
background:#1f1f1f;
padding:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.5);
}

h1{
margin:0;
font-size:30px;
}

p{
opacity:0.8;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
gap:20px;
padding:20px;
max-width:1400px;
margin:auto;
}

.card{
background:#1a1a1a;
border-radius:12px;
padding:12px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
transition:0.25s;
}

.card:hover{
transform:translateY(-4px);
box-shadow:0 8px 20px rgba(0,0,0,0.8);
}

iframe{
width:100%;
height:210px;
border:none;
border-radius:8px;
}

.name{
margin:10px 0;
font-size:16px;
font-weight:bold;
}

.name a{
color:white;
text-decoration:none;
}

.name a:hover{
color:#ff4444;
}

.live{
color:#ff4444;
font-size:12px;
margin-left:6px;
}

</style>

<script>

];

const grid = document.querySelector(".grid");

async function loadStreams(){

grid.innerHTML = "";

for(const ch of channels){

const url =
`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${ch.id}&eventType=live&type=video&key=${API_KEY}`;

const res = await fetch(url);
const data = await res.json();

if(data.items.length > 0){

const videoId = data.items[0].id.videoId;

const card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<div class="name">${ch.name} 🔴LIVE</div>
<iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>
`;

grid.appendChild(card);

}

}

if(grid.innerHTML === ""){
grid.innerHTML = "<h2>現在配信している人はいません</h2>";
}

}

loadStreams();

setInterval(loadStreams,60000);

</script>
