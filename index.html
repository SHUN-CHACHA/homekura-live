<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>homeクラ 配信ポータル　＠旬茶</title>

<link rel="icon" href="https://shun-chacha.github.io/homekura-live/favicon.ico" type="image/x-icon">
<link rel="icon" href="https://shun-chacha.github.io/homekura-live/icon.png" type="image/png" sizes="192x192">
<link rel="apple-touch-icon" href="https://shun-chacha.github.io/homekura-live/apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="homeクラ">
<meta name="theme-color" content="#1f1f1f">

<style>
    body { margin: 0; font-family: sans-serif; background: #0f0f0f; color: white; padding-bottom: 50px; }
    
    header { 
        background: #1f1f1f; 
        padding: 15px; 
        border-bottom: 2px solid #333; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        position: sticky;
        top: 0;
        z-index: 1000;
    }

    .header-logo { height: 48px; width: auto; margin-bottom: 10px; }

    .header-controls {
        display: flex;
        align-items: center;
        gap: 15px;
    }

    .btn-refresh-header {
        background: #28a745;
        color: #fff;
        border: none;
        padding: 6px 15px;
        border-radius: 4px;
        font-size: 13px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
    }

    #timer { font-size: 12px; color: #888; font-family: monospace; }
    .progress-container { width: 100%; height: 3px; background: #333; position: relative; overflow: hidden; }
    #progress-bar { width: 100%; height: 100%; background: #28a745; transition: width 1s linear; }

    /* アニメーション */
    @keyframes blink { 50% { opacity: 0.3; } }
    @keyframes pulse-green {
        0% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.4); }
        70% { box-shadow: 0 0 0 10px rgba(40, 167, 69, 0); }
        100% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0); }
    }

    .live-badge {
        position: absolute;
        top: 8px;
        left: 8px;
        background: #28a745;
        color: white;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 10px;
        font-weight: bold;
        z-index: 10;
        animation: blink 1s infinite;
    }

    .section-title { max-width: 1400px; margin: 20px auto 10px; padding: 0 10px; font-size: 14px; font-weight: bold; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 0 8px 20px; max-width: 1400px; margin: auto; }
    
    .card { background: #1a1a1a; border-radius: 8px; overflow: hidden; border: 1px solid #333; display: flex; flex-direction: column; position: relative; }
    .card.is-live { border-color: #28a745 !important; animation: pulse-green 2s infinite; }

    .delete-btn { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.6); color: #888; border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 14px; cursor: pointer; z-index: 11; }

    .thumb-wrap { position: relative; aspect-ratio: 16 / 9; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .thumb { width: 100%; height: 100%; object-fit: cover; }
    .thumb-bg { position: absolute; width: 100%; height: 100%; opacity: 0.3; filter: blur(20px); }
    .thumb-profile { width: 45%; height: auto; border-radius: 50%; position: relative; z-index: 2; border: 2px solid rgba(255,255,255,0.2); }
    
    .info { padding: 8px; }
    .name { font-weight: bold; font-size: 11px; margin-bottom: 2px; }
    .title { font-size: 11px; line-height: 1.2; height: 2.4em; overflow: hidden; color: #eee; }

    .btn-area { padding: 0 8px 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
    .btn { display: block; text-align: center; text-decoration: none; font-size: 10px; padding: 5px 0; border-radius: 4px; color: white; background: #333; }
    .btn-yt { background: #c00; }
    .btn-reserve { background: #555; cursor: pointer; border: none; font-family: inherit; }
    .btn-reserve.active { background: #ffcc00; color: #000; font-weight: bold; }

    .admin-panel { max-width: 1400px; margin: 20px auto; padding: 15px; background: #1a1a1a; border-radius: 8px; border: 1px solid #333; }
    .input-group { display: flex; flex-wrap: wrap; gap: 8px; }
    .input-group input { background: #222; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; flex: 1; min-width: 140px; }
    .btn-add { background: #28a745; color: white; border: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; }

    @media (min-width: 768px) {
        .grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .name, .title { font-size: 14px; }
        .btn { font-size: 12px; }
    }
</style>
</head>
<body>

<header>
    <img src="logo.png" alt="homeクラ" class="header-logo">
    <div class="header-controls">
        <button id="refresh-btn" class="btn-refresh-header" onclick="manualRefresh()">更新</button>
        <div id="timer">Next Update: --:--</div>
    </div>
</header>

<div class="progress-container">
    <div id="progress-bar"></div>
</div>

<div id="liveSection" style="display: none;">
    <div class="section-title" style="color:#28a745">🟢 配信中のメンバー</div>
    <div id="liveGrid" class="grid"></div>
</div>

<div id="upcomingSection" style="display: none;">
    <div class="section-title" style="color:#ffcc00">🟡 配信予定のメンバー</div>
    <div id="upcomingGrid" class="grid"></div>
</div>

<hr style="border: 0; border-top: 1px solid #222; margin: 20px 0;">

<div class="admin-panel">
    <div class="admin-header"><h3>➕ 配信者を追加する</h3></div>
    <div class="input-group">
        <input type="text" id="new-name" placeholder="名前">
        <input type="text" id="new-id" placeholder="チャンネルID">
        <input type="text" id="new-twitter" placeholder="X ID">
        <input type="color" id="new-color" value="#ffffff" style="width: 40px;">
        <button class="btn-add" onclick="addChannel()">追加</button>
    </div>
    <button style="background:none; border:none; color:#555; cursor:pointer; font-size:10px; margin-top:10px;" onclick="resetChannels()">初期状態に戻す</button>
</div>

<div class="section-title" style="color:#aaa">👥 メンバー一覧</div>
<div id="allGrid" class="grid"></div>

<script>
const API_KEY = 'AIzaSyDoy4uvy_4jXcpGw8fxTE33lFmBn18fAYY'; 

const defaultChannels = [
    {name:"まぐにぃ", id:"UCMP7QuS4suoONg47Nbi-wrg", twitterId:"maguro29", color:"#ff9900"},
    {name:"じゃじゃーん菊地", id:"UCi2kiw8hMo0vMAh5lXiafug", twitterId:"kikuchidaisuke", color:"#ffff00"},
    {name:"さかいさんだー", id:"UCuk8ABJTVWiApYlEojW_QrA", twitterId:"Sakai_Thunder", color:"#ff00ff"},
    {name:"Ｍさん", id:"UCGK0iFuXhfA5VnL64xiKEmQ", twitterId:"maikura_souti", color:"#00ffff"},
    {name:"タツナミ先生", id:"UCedenULTLYf3DanflEXdRCQ", twitterId:"tatsunami", color:"#00ff00"},
    {name:"神近", id:"UCdLe2q91fJkN9GEyDvItp-w", twitterId:"t_kamichika", color:"#ffffff"},
    {name:"しろくる", id:"UCle3bhQ-tZty8KNcACbUBZQ", twitterId:"sirokuru_", color:"#ffffff"},
    {name:"たにし", id:"UCiC8VCiSLD3mxoO-QFKQnBQ", twitterId:"tanishi_manbo", color:"#0000ff"},
    {name:"凸もり", id:"UCdN9GjPrqhcrzE27eWNNjxg", twitterId:"mk_2_totsu", color:"#888888"},
    {name:"神宮寺ちゃんねる", id:"UCou8IVB8jJPk56H0farYQdA", twitterId:"jinguji777ch", color:"#ff0000"},
    {name:"カズクラ", id:"UCu3Mp1ZimtNvyA-bcfo9VrQ", twitterId:"kazuch0924", color:"#ff0000"},
    {name:"たいたい", id:"UCds-nvoKCcvixVXJ_54QcbQ", twitterId:"taitaiMEN1997", color:"#00ccff"},
    {name:"岐阜のこみちん", id:"UCw4frqkotySLjJ_CFZR5-7w", twitterId:"komichin0704", color:"#ffcc00"},
    {name:"ナナホシナナ", id:"UCncsOsnMBAAaYb6WidBYIDw", twitterId:"nanahoshinana77", color:"#ff33ff"},
    {name:"月成るくす", id:"UCP9rcDSyTRtnu8EsG2CmLMg", twitterId:"Tsukinari_Lux_", color:"#ffffcc"},
    {name:"メッス", id:"UCkJeBcOPRBs5bri5B3sFgVg", twitterId:"messu_009", color:"#333333"},
    {name:"よいよい", id:"UCzk-vAIbo3iVBGTNaJQS2qQ", twitterId:"yoiy0i", color:"#ccff00"},
    {name:"うえまさ", id:"UCIBDdDXnViOgN5tCpfX7NOA", twitterId:"uema5aCh", color:"#9900ff"},
    {name:"久那式リン", id:"UCPs7s2VlkwVWWpjcyjviINA", twitterId:"Kunashiki_Lin_", color:"#ffffff"},
    {name:"犬野はる", id:"UCVB16vOi24WElLNbbmOFFsA", twitterId:"VT_InunoHaru", color:"#ccffcc"},
    {name:"珍珠花こまり", id:"UCSLCZ5uhCYUMQ9TG9Cs1ERQ", twitterId:"komari_yuki", color:"#ffffff"},
    {name:"ぽこにゃん", id:"UCO06KZjWOe6b1tXrgzzakZA", twitterId:"pokonyan1185", color:"#00ff00"},
    {name:"KtR（こーたろー）", id:"UCuJVrV6spfu9QUP6Wr4fugA", twitterId:"HAOKtR", color:"#3399ff"}
];

let channels = [];
let reservedVideos = JSON.parse(localStorage.getItem('reserved_videos') || '[]');
const UPDATE_INTERVAL = 600; 
let timeLeft = UPDATE_INTERVAL;

function initChannels() {
    const saved = localStorage.getItem('custom_channels');
    channels = saved ? JSON.parse(saved) : [...defaultChannels];
}

function toggleReserve(videoId, channelName) {
    if (Notification.permission !== "granted") {
        Notification.requestPermission();
    }
    const index = reservedVideos.indexOf(videoId);
    if (index > -1) {
        reservedVideos.splice(index, 1);
    } else {
        reservedVideos.push(videoId);
    }
    localStorage.setItem('reserved_videos', JSON.stringify(reservedVideos));
    loadPortal();
}

function checkNotifications(vData) {
    vData.items.forEach(v => {
        if (v.snippet.liveBroadcastContent === 'live' && reservedVideos.includes(v.id)) {
            new Notification("配信開始！", {
                body: `${v.snippet.channelTitle}さんの配信が始まりました！`,
                icon: v.snippet.thumbnails.default.url
            });
            // 通知したらリストから消す
            reservedVideos = reservedVideos.filter(id => id !== v.id);
            localStorage.setItem('reserved_videos', JSON.stringify(reservedVideos));
        }
    });
}

async function loadPortal() {
    if (channels.length === 0) return;
    let videoIds = [];
    let channelInfoMap = {};
    const channelIds = channels.map(c => c.id).join(',');

    try {
        const chRes = await fetch(`https://www.googleapis.com/youtube/v3/channels?key=${API_KEY}&id=${channelIds}&part=snippet`);
        const chData = await chRes.json();
        chData.items.forEach(item => channelInfoMap[item.id] = { icon: item.snippet.thumbnails.medium.url });

        for (const ch of channels) {
            const playlistId = ch.id.replace(/^UC/, 'UU');
            const res = await fetch(`https://www.googleapis.com/youtube/v3/playlistItems?key=${API_KEY}&playlistId=${playlistId}&part=snippet&maxResults=1`);
            const data = await res.json();
            if (data.items && data.items.length > 0) {
                const vId = data.items[0].snippet.resourceId.videoId;
                videoIds.push(vId);
                if (channelInfoMap[ch.id]) Object.assign(channelInfoMap[ch.id], { lastVideoId: vId });
            }
        }

        const vRes = await fetch(`https://www.googleapis.com/youtube/v3/videos?key=${API_KEY}&id=${videoIds.join(',')}&part=snippet,liveStreamingDetails`);
        const vData = await vRes.json();
        
        // 通知チェック
        checkNotifications(vData);

        let liveHtml = "", upcomingHtml = "", allHtml = "";
        let liveCount = 0, upcomingCount = 0;

        channels.forEach(ch => {
            const chInfo = channelInfoMap[ch.id];
            if (!chInfo) return;
            const vItem = vData.items.find(v => v.id === chInfo.lastVideoId);
            const status = vItem ? vItem.snippet.liveBroadcastContent : 'none';
            const isLive = status === 'live';
            const isUpcoming = status === 'upcoming';
            const isReserved = reservedVideos.includes(chInfo.lastVideoId);

            let timeStr = "OFFLINE";
            if (isLive) timeStr = vItem.snippet.title;
            else if (isUpcoming) {
                const d = new Date(vItem.liveStreamingDetails.scheduledStartTime);
                timeStr = `🕒 ${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}～`;
            }

            const mediaHtml = (isLive || isUpcoming) 
                ? `${isLive ? '<div class="live-badge">LIVE</div>' : ''}<img class="thumb" src="${vItem.snippet.thumbnails.medium.url}">`
                : `<div class="thumb-bg" style="background: ${ch.color}"></div><img class="thumb-profile" src="${chInfo.icon}">`;

            const cardHtml = `
            <div class="card ${isLive ? 'is-live' : ''}">
                <button class="delete-btn" onclick="deleteChannel('${ch.id}')">×</button>
                <a href="https://youtube.com/watch?v=${chInfo.lastVideoId}" target="_blank" style="text-decoration:none; color:inherit;">
                    <div class="thumb-wrap">${mediaHtml}</div>
                    <div class="info">
                        <div class="name" style="color:${ch.color}">${ch.name}</div>
                        <div class="title">${timeStr}</div>
                    </div>
                </a>
                <div class="btn-area">
                    <a href="https://youtube.com/channel/${ch.id}" target="_blank" class="btn btn-yt">YouTube</a>
                    ${isUpcoming ? 
                        `<button class="btn btn-reserve ${isReserved ? 'active' : ''}" onclick="toggleReserve('${chInfo.lastVideoId}', '${ch.name}')">${isReserved ? '🔔 予約中' : '🔔 通知予約'}</button>` : 
                        `<a href="https://x.com/${ch.twitterId}" target="_blank" class="btn">X(Twitter)</a>`
                    }
                </div>
            </div>`;
            
            if (isLive) { liveHtml += cardHtml; liveCount++; }
            else if (isUpcoming) { upcomingHtml += cardHtml; upcomingCount++; }
            allHtml += cardHtml;
        });

        document.getElementById("liveSection").style.display = liveCount > 0 ? "block" : "none";
        document.getElementById("liveGrid").innerHTML = liveHtml;
        document.getElementById("upcomingSection").style.display = upcomingCount > 0 ? "block" : "none";
        document.getElementById("upcomingGrid").innerHTML = upcomingHtml;
        document.getElementById("allGrid").innerHTML = allHtml;
    } catch (e) { console.error(e); }
}

// -- 以下、共通管理関数 (add, delete, manualRefresh, timer) --
function addChannel() {
    const name = document.getElementById('new-name').value;
    const id = document.getElementById('new-id').value;
    const twitterId = document.getElementById('new-twitter').value;
    const color = document.getElementById('new-color').value;
    if (!name || !id) return;
    channels.push({ name, id, twitterId, color });
    localStorage.setItem('custom_channels', JSON.stringify(channels));
    loadPortal();
}
function deleteChannel(id) {
    if(confirm("削除しますか？")) {
        channels = channels.filter(ch => ch.id !== id);
        localStorage.setItem('custom_channels', JSON.stringify(channels));
        loadPortal();
    }
}
function resetChannels() {
    if(confirm("リセットしますか？")) {
        localStorage.removeItem('custom_channels');
        channels = [...defaultChannels];
        loadPortal();
    }
}
async function manualRefresh() {
    const btn = document.getElementById('refresh-btn');
    btn.disabled = true;
    await loadPortal();
    timeLeft = UPDATE_INTERVAL;
    btn.disabled = false;
}
function updateTimerDisplay() {
    const barElement = document.getElementById('progress-bar');
    const m = Math.floor(timeLeft / 60);
    const s = timeLeft % 60;
    document.getElementById('timer').innerText = `Next Update: ${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    barElement.style.width = `${(timeLeft / UPDATE_INTERVAL) * 100}%`;
    barElement.style.background = timeLeft < 60 ? "#1e7e34" : "#28a745";
}

initChannels();
loadPortal();
setInterval(() => {
    timeLeft--;
    if (timeLeft < 0) { loadPortal(); timeLeft = UPDATE_INTERVAL; }
    updateTimerDisplay();
}, 1000);
</script>
</body>
</html>
