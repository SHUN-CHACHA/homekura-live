<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>homeクラ 配信ポータル</title>
<style>
    body { margin: 0; font-family: sans-serif; background: #0f0f0f; color: white; padding-bottom: 50px; }
    header { background: #1f1f1f; padding: 15px 20px; text-align: center; border-bottom: 2px solid #333; display: flex; justify-content: center; align-items: center; height: 60px; }
    .header-logo { max-height: 100%; width: auto; display: block; }

    /* セクションの見出し */
    .section-title { 
        max-width: 1400px; margin: 30px auto 10px; padding: 0 20px; 
        font-size: 18px; font-weight: bold; display: flex; align-items: center; gap: 10px;
    }
    .section-title.live { color: #ff4444; }
    .section-title.all { color: #aaa; border-top: 1px solid #333; pt: 30px; margin-top: 40px; padding-top: 20px; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 0 20px 20px; max-width: 1400px; margin: auto; }
    
    .card { background: #1a1a1a; border-radius: 12px; overflow: hidden; border: 1px solid #333; display: flex; flex-direction: column; transition: .2s; }
    .card:hover { transform: translateY(-3px); border-color: #555; }
    .card.is-live { border-color: #ff0000; box-shadow: 0 0 15px rgba(255,0,0,0.3); }

    .video-link { text-decoration: none; color: inherit; flex-grow: 1; }
    .thumb-wrap { position: relative; }
    .thumb { width: 100%; aspect-ratio: 16 / 9; object-fit: cover; display: block; }
    
    .live-label { position: absolute; top: 10px; left: 10px; background: #ff0000; color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; animation: blink 1.5s infinite; }
    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

    .info { padding: 12px; }
    .name { font-weight: bold; font-size: 14px; color: #aaa; margin-bottom: 4px; }
    .title { font-size: 14px; line-height: 1.4; height: 2.8em; overflow: hidden; margin-bottom: 8px; color: #eee; }
    .time-info { font-size: 12px; color: #ff8888; font-weight: bold; }

    .btn-area { padding: 0 12px 12px 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .btn { display: block; text-align: center; text-decoration: none; font-size: 12px; padding: 8px 0; border-radius: 6px; border: 1px solid #444; color: white; }
    .btn-yt { background: #c00; }
    .btn-tw { background: #000; }
</style>
</head>
<body>

<header>
    <img src="logo.png" alt="homeクラ 配信ポータル" class="header-logo">
</header>

<div id="liveSection" style="display: none;">
    <div class="section-title live">🔴 配信中のメンバー</div>
    <div id="liveGrid" class="grid"></div>
</div>

<div class="section-title all">👥 メンバー一覧</div>
<div id="allGrid" class="grid"></div>

<script>
const API_KEY = 'AIzaSyDoy4uvy_4jXcpGw8fxTE33lFmBn18fAYY'; 

const channels = [
    {name:"まぐにぃ", id:"UCMP7QuS4suoONg47Nbi-wrg", twitterId:"maguro29"},
    {name:"じゃじゃーん菊地", id:"UCi2kiw8hMo0vMAh5lXiafug", twitterId:"kikuchidaisuke"},
    {name:"さかいさんだー", id:"UCuk8ABJTVWiApYlEojW_QrA", twitterId:"Sakai_Thunder"},
    {name:"Ｍさん", id:"UCGK0iFuXhfA5VnL64xiKEmQ", twitterId:"maikura_souti"},
    {name:"タツナミ先生", id:"UCedenULTLYf3DanflEXdRCQ", twitterId:"tatsunami"},
    {name:"神近", id:"UCdLe2q91fJkN9GEyDvItp-w", twitterId:"t_kamichika"},
    {name:"しろくる", id:"UCle3bhQ-tZty8KNcACbUBZQ", twitterId:"sirokuru_"},
    {name:"たにし", id:"UCiC8VCiSLD3mxoO-QFKQnBQ", twitterId:"tanishi_manbo"},
    {name:"凸もり", id:"UCdN9GjPrqhcrzE27eWNNjxg", twitterId:"mk_2_totsu"},
    {name:"神宮寺ちゃんねる", id:"UCou8IVB8jJPk56H0farYQdA", twitterId:"jinguji777ch"},
    {name:"カズクラ", id:"UCu3Mp1ZimtNvyA-bcfo9VrQ", twitterId:"kazuch0924"},
    {name:"たいたい", id:"UCds-nvoKCcvixVXJ_54QcbQ", twitterId:"taitaiMEN1997"},
    {name:"岐阜のこみちん", id:"UCw4frqkotySLjJ_CFZR5-7w", twitterId:"komichin0704"},
    {name:"ナナホシナナ", id:"UCncsOsnMBAAaYb6WidBYIDw", twitterId:"nanahoshinana77"},
    {name:"月成るくす", id:"UCP9rcDSyTRtnu8EsG2CmLMg", twitterId:"Tsukinari_Lux_"},
    {name:"メッス", id:"UCkJeBcOPRBs5bri5B3sFgVg", twitterId:"messu_009"},

    {name:"うえまさ", id:"UCIBDdDXnViOgN5tCpfX7NOA", twitterId:"uema5aCh"},
    {name:"久那式リン", id:"UCPs7s2VlkwVWWpjcyjviINA", twitterId:"Kunashiki_Lin_"},
    {name:"犬野はる", id:"UCVB16vOi24WElLNbbmOFFsA", twitterId:"VT_InunoHaru"},
    {name:"珍珠花こまり", id:"UCSLCZ5uhCYUMQ9TG9Cs1ERQ", twitterId:"komari_yuki"},
    {name:"ぽこにゃん", id:"UCO06KZjWOe6b1tXrgzzakZA", twitterId:"pokonyan1185"},
    {name:"KtR（こーたろー）", id:"UCuJVrV6spfu9QUP6Wr4fugA", twitterId:"HAOKtR"}
];

function getRelativeTime(dateStr) {
    const start = new Date(dateStr);
    const now = new Date();
    const diffMin = Math.floor((now - start) / 60000);
    return diffMin < 60 ? `${diffMin}分前に開始` : `${Math.floor(diffMin / 60)}時間前に開始`;
}

async function loadPortal() {
    let videoIds = [];
    let channelInfoMap = {};

    for (const ch of channels) {
        try {
            const playlistId = ch.id.replace(/^UC/, 'UU');
            const res = await fetch(`https://www.googleapis.com/youtube/v3/playlistItems?key=${API_KEY}&playlistId=${playlistId}&part=snippet&maxResults=1`);
            const data = await res.json();
            if (data.items && data.items.length > 0) {
                const vId = data.items[0].snippet.resourceId.videoId;
                videoIds.push(vId);
                channelInfoMap[vId] = { name: ch.name, chId: ch.id, twitter: ch.twitterId };
            }
        } catch (e) { console.error(ch.name, e); }
    }

    try {
        const res = await fetch(`https://www.googleapis.com/youtube/v3/videos?key=${API_KEY}&id=${videoIds.join(',')}&part=snippet,liveStreamingDetails`);
        const data = await res.json();
        
        let liveHtml = "";
        let allHtml = "";
        let liveCount = 0;

        data.items.forEach(item => {
            const vId = item.id;
            const info = channelInfoMap[vId];
            const isLive = item.snippet.liveBroadcastContent === 'live';
            
            const startTime = isLive && item.liveStreamingDetails ? item.liveStreamingDetails.actualStartTime : null;
            const timeTag = startTime ? `<div class="time-info">🕒 ${getRelativeTime(startTime)}</div>` : "";

            const cardHtml = `
            <div class="card ${isLive ? 'is-live' : ''}">
                <a href="https://youtube.com/watch?v=${vId}" target="_blank" class="video-link">
                    <div class="thumb-wrap">
                        <img class="thumb" src="${item.snippet.thumbnails.high ? item.snippet.thumbnails.high.url : item.snippet.thumbnails.default.url}">
                        ${isLive ? '<div class="live-label">LIVE</div>' : ''}
                    </div>
                    <div class="info">
                        <div class="name">${info.name}</div>
                        <div class="title">${item.snippet.title}</div>
                        ${timeTag}
                    </div>
                </a>
                <div class="btn-area">
                    <a href="https://youtube.com/channel/${info.chId}" target="_blank" class="btn btn-yt">YouTube</a>
                    <a href="https://twitter.com/${info.twitter}" target="_blank" class="btn btn-tw">Twitter(X)</a>
                </div>
            </div>`;
            
            if (isLive) {
                liveHtml += cardHtml;
                liveCount++;
            }
            allHtml += cardHtml; // 放送していない人も含め全員分
        });

        // 配信中セクションの表示・非表示
        const liveSection = document.getElementById("liveSection");
        if (liveCount > 0) {
            liveSection.style.display = "block";
            document.getElementById("liveGrid").innerHTML = liveHtml;
        } else {
            liveSection.style.display = "none";
        }

        document.getElementById("allGrid").innerHTML = allHtml;

    } catch (e) { console.error(e); }
}

loadPortal();
setInterval(loadPortal, 600000);
</script>
</body>
</html>
