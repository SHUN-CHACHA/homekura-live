<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ほめクラLIVE</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:sans-serif;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#1b1b1b;
border-radius:10px;
padding:10px;
}

.thumb{
width:100%;
border-radius:8px;
}

.live{
color:#ff4444;
font-weight:bold;
}

button{
background:red;
border:none;
padding:10px;
color:white;
border-radius:6px;
}

</style>

</head>

<body>

<h1>ほめクラLIVE</h1>

<div class="grid" id="grid"></div>

<script>

const streamers=[

{name:"まぐにぃ",handle:"ゲームまぐにぃ"},
{name:"じゃじゃーん菊地",handle:"jajakiku"},
{name:"さかいさんだー",handle:"Sakai_Thunder"},
{name:"Ｍさん",handle:"Mさん_MrMsan"},
{name:"タツナミ先生",handle:"kazocra236448"},
{name:"神近",handle:"神近-t"},
{name:"しろくる",handle:"sirokuru"},
{name:"たにし",handle:"tanishi-rice"},
{name:"凸もり",handle:"totsumori-live"},
{name:"神宮寺ちゃんねる",handle:"JingujiGames"},
{name:"カズクラ",handle:"kazukura"},
{name:"たいたい",handle:"taitaiYOUTUBE"},
{name:"岐阜のこみちん",handle:"komichingames"},

const grid=document.getElementById("grid");

streamers.forEach(s=>{

チャンネル
</button>

`;

grid.appendChild(div);

});

</script>

</body>
</html>
