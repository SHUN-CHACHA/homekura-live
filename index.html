<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>homeクラ 配信ポータル　＠旬茶</title>

    <link rel="icon" href="https://shun-chacha.github.io/homekura-live/favicon.ico" type="image/x-icon">
    <link rel="icon" href="https://shun-chacha.github.io/homekura-live/icon.png" type="image/png" sizes="192x192">
    <link rel="apple-touch-icon" href="https://shun-chacha.github.io/homekura-live/apple-touch-icon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="homeクラ">

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

    <style>
        :root {
            --bg-color: #0f0f0f;
            --header-bg: #1f1f1f;
            --card-bg: #1a1a1a;
            --text-color: #ffffff;
            --border-color: #333;
            --accent-green: #28a745;
            --secondary-text: #888;
        }

        [data-theme="light"] {
            --bg-color: #f0f2f5;
            --header-bg: #ffffff;
            --card-bg: #ffffff;
            --text-color: #1c1e21;
            --border-color: #ddd;
            --accent-green: #24b344;
            --secondary-text: #666;
        }

        body { margin: 0; font-family: sans-serif; background: var(--bg-color); color: var(--text-color); padding-bottom: 50px; transition: background 0.3s; }
        
        header { 
            background: var(--header-bg); 
            padding: 15px; 
            border-bottom: 2px solid var(--border-color); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            position: sticky; top: 0; z-index: 1000;
        }

        .header-logo { height: 48px; width: auto; margin-bottom: 10px; }

        .header-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }

        .btn-tool {
            background: var(--accent-green);
            color: #fff; border: none; padding: 6px 15px; border-radius: 4px;
            font-size: 13px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-theme { background: #555; }

        #timer { font-size: 12px; color: var(--secondary-text); font-family: monospace; }
        .progress-container { width: 100%; height: 3px; background: var(--border-color); position: relative; overflow: hidden; }
        #progress-bar { width: 100%; height: 100%; background: var(--accent-green); transition: width 1s linear; }

        @keyframes blink { 50% { opacity: 0.3; } }
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(40, 167, 69, 0); }
            100% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0); }
        }

        .live-badge {
            position: absolute; top: 8px; left: 8px; background: #28a745; color: white;
            padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold;
            z-index: 10; animation: blink 1s infinite;
        }

        .section-title { max-width: 1400px; margin: 20px auto 10px; padding: 0 10px; font-size: 14px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 0 8px 20px; max-width: 1400px; margin: auto; }
        
        .card { 
            background: var(--card-bg); border-radius: 8px; overflow: hidden; 
            border: 1px solid var(--border-color); display: flex; flex-direction: column; 
            position: relative; transition: transform 0.2s;
        }
        .card.is-live { border-color: #28a745 !important; animation: pulse-green 2s infinite; }
        .sortable-ghost { opacity: 0.3; background: #28a745; }

        .delete-btn { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.5); color: #fff; border: none; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; z-index: 11; }

        .thumb-wrap { position: relative; aspect-ratio: 16 / 9; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #000; }
        .thumb { width: 100%; height: 100%; object-fit: cover; }
        .thumb-bg { position: absolute; width: 100%; height: 100%; opacity: 0.3; filter: blur(20px); }
        .thumb-profile { width: 45%; height: auto; border-radius: 50%; position: relative; z-index: 2; border: 2px solid rgba(255,255,255,0.2); }
        
        .info { padding: 8px; flex-grow: 1; }
        .name { font-weight: bold; font-size: 11px; margin-bottom: 2px; }
        .title { font-size: 11px; line-height: 1.2; height: 2.4em; overflow: hidden; color: var(--text-color); opacity: 0.9; }

        .btn-area { padding: 0 8px 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        .btn { display: block; text-align: center; text-decoration: none; font-size: 10px; padding: 5px 0; border-radius: 4px; color: white; background: #333; }
        .btn-yt { background: #c00; }
        .btn-tw { background: #9146FF; }
        .btn-dc { background: #5865F2; }
        .btn-tk { background: #010101; border: 1px solid #444; }
        .btn-ig { background: linear-gradient(45deg, #f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%); }
        .btn-reserve { background: #555; cursor: pointer; border: none; font-family: inherit; }
        .btn-reserve.active { background: #ffcc00; color: #000; font-weight: bold; }

        .admin-panel { max-width: 1400px; margin: 20px auto; padding: 15px; background: var(--card-bg); border-radius: 8px; border: 1px solid var(--border-color); }
        .input-group { display: flex; flex-wrap: wrap; gap: 8px; }
        .input-group input { background: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-color); padding: 8px; border-radius: 4px; flex: 1; min-width: 140px; }

        @media (min-width: 768px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
            .name, .title { font-size: 14px; }
            .btn { font-size: 12px; }
        }
    </style>
</head>
<body>

<header>
    <img src="logo.png" alt="homeクラ" class="header-logo">
    <div class="header-controls">
        <button id="refresh-btn" class="btn-tool" onclick="manualRefresh()">更新</button>
        <button class="btn-tool btn-theme" onclick="toggleTheme()">🌓 テーマ切替</button>
        <div id="timer">Next Update: --:--</div>
    </div>
</header>

<div class="progress-container">
    <div id="progress-bar"></div>
</div>

<div id="liveSection" style="display: none;">
    <div class="section-title" style="color:#28a745">🟢 配信中のメンバー</div>
    <div id="liveGrid" class="grid"></div>
</div>

<div id="upcomingSection" style="display: none;">
    <div class="section-title" style="color:#ffcc00">🟡 配信予定のメンバー</div>
    <div id="upcomingGrid" class="grid"></div>
</div>

<hr style="border: 0; border-top: 1px solid var(--border-color); margin: 20px 0;">

<div class="section-title" style="color:var(--secondary-text)">👥 メンバー一覧 (ドラッグで並び替え)</div>
<div id="allGrid" class="grid"></div>

<div class="admin-panel">
    <h3>➕ 配信者を追加する</h3>
    <div class="input-group">
        <input type="text" id="new-name" placeholder="名前">
        <input type="text" id="new-id" placeholder="YouTube ID">
        <input type="text" id="new-twitter" placeholder="X ID">
        <input type="text" id="new-twitch" placeholder="Twitch ID">
        <input type="text" id="new-tiktok" placeholder="TikTok ID">
        <input type="text" id="new-insta" placeholder="Instagram ID">
        <input type="text" id="new-discord" placeholder="Discord URL">
        <input type="color" id="new-color" value="#ffffff" style="width: 40px; height: 38px; border:none; padding:0; cursor:pointer;">
        <button class="btn-tool" onclick="addChannel()">追加</button>
    </div>
    <button style="background:none; border:none; color:#555; cursor:pointer; font-size:10px; margin-top:10px;" onclick="resetChannels()">初期状態に戻す</button>
</div>

<script>
const API_KEY = 'AIzaSyDoy4uvy_4jXcpGw8fxTE33lFmBn18fAYY';
const NOTIFY_SOUND = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');

const defaultChannels = [
    {name:"まぐにぃ", id:"UCMP7QuS4suoONg47Nbi-wrg", twitterId:"maguro29", twitchId:"maguro29game", tiktokId:"", instaId:"", discordUrl:"https://discord.gg/bRuT74X7sS", color:"#ff9900"},
    {name:"じゃじゃーん菊地", id:"UCi2kiw8hMo0vMAh5lXiafug", twitterId:"kikuchidaisuke", twitchId:"", tiktokId:"jajakiku", instaId:"", discordUrl:"", color:"#ffff00"},
    {name:"さかいさんだー", id:"UCuk8ABJTVWiApYlEojW_QrA", twitterId:"Sakai_Thunder", twitchId:"", tiktokId:"", instaId:"", discordUrl:"", color:"#ff00ff"},
    {name:"Ｍさん", id:"UCGK0iFuXhfA5VnL64xiKEmQ", twitterId:"maikura_souti", twitchId:"msan_no_nitizyou", tiktokId:"msan_official", instaId:"", discordUrl:"", color:"#00ffff"},
    {name:"タツナミ先生", id:"UCedenULTLYf3DanflEXdRCQ", twitterId:"tatsunami", twitchId:"", tiktokId:"", instaId:"", discordUrl:"", color:"#00ff00"},
    {name:"神近", id:"UCdLe2q91fJkN9GEyDvItp-w", twitterId:"t_kamichika", twitchId:"", tiktokId:"", instaId:"", discordUrl:"", color:"#ffffff"},
    {name:"しろくる", id:"UCTl5XpFddyDsj5woStUPu0w", twitterId:"sirokuru_", twitchId:"sirokuru", tiktokId:"sirokuru", instaId:"", discordUrl:"", color:"#ffffff"},
    {name:"たにし", id:"UCiC8VCiSLD3mxoO-QFKQnBQ", twitterId:"tanishi_manbo", twitchId:"", tiktokId:"", instaId:"", discordUrl:"", color:"#0000ff"},
    {name:"凸もり", id:"UCdN9GjPrqhcrzE27eWNNjxg", twitterId:"mk_2_totsu", twitchId:"totsumori", tiktokId:"", instaId:"", discordUrl:"", color:"#888888"},
    {name:"神宮寺ちゃんねる", id:"UCou8IVB8jJPk56H0farYQdA", twitterId:"jinguji777ch", twitchId:"", tiktokId:"", instaId:"", discordUrl:"", color:"#ff0000"},
    {name:"カズクラ", id:"UCu3Mp1ZimtNvyA-bcfo9VrQ", twitterId:"kazuch0924", twitchId:"", tiktokId:"super_kazukura", instaId:"kazuch0924", discordUrl:"", color:"#ff0000"},
    {name:"たいたい", id:"UCds-nvoKCcvixVXJ_54QcbQ", twitterId:"taitaiMEN1997", twitchId:"taitai19970904", tiktokId:"", instaId:"", discordUrl:"", color:"#00ccff"},
    {name:"岐阜のこみちん", id:"UCw4frqkotySLjJ_CFZR5-7w", twitterId:"komichin0704", twitchId:"", tiktokId:"", instaId:"komichin0704", discordUrl:"", color:"#ffcc00"},
    {name:"ナナホシナナ", id:"UCncsOsnMBAAaYb6WidBYIDw", twitterId:"nanahoshinana77", twitchId:"nanahoshinana77", tiktokId:"", instaId:"", discordUrl:"", color:"#ff33ff"},
    {name:"月成るくす", id:"UCP9rcDSyTRtnu8EsG2CmLMg", twitterId:"Tsukinari_Lux_", twitchId:"", tiktokId:"", instaId:"tsukinarilux", discordUrl:"", color:"#ffffcc"},
    {name:"メッス", id:"UCkJeBcOPRBs5bri5B3sFgVg", twitterId:"messu_009", twitchId:"", tiktokId:"", instaId:"", discordUrl:"", color:"#333333"},
    {name:"よいよい", id:"UCzk-vAIbo3iVBGTNaJQS2qQ", twitterId:"yoiy0i", twitchId:"", tiktokId:"", instaId:"", discordUrl:"", color:"#ccff00"},
    {name:"うえまさ", id:"UCIBDdDXnViOgN5tCpfX7NOA", twitterId:"uema5aCh", twitchId:"", tiktokId:"", instaId:"uema5a", discordUrl:"", color:"#9900ff"},
    {name:"久那式リン", id:"UCPs7s2VlkwVWWpjcyjviINA", twitterId:"Kunashiki_Lin_", twitchId:"", tiktokId:"", instaId:"", discordUrl:"", color:"#ffffff"},
    {name:"犬野はる", id:"UCVB16vOi24WElLNbbmOFFsA", twitterId:"VT_InunoHaru", twitchId:"", tiktokId:"", instaId:"", discordUrl:"", color:"#ccffcc"},
    {name:"珍珠花こまり", id:"UCSLCZ5uhCYUMQ9TG9Cs1ERQ", twitterId:"komari_yuki", twitchId:"", tiktokId:"", instaId:"", discordUrl:"", color:"#ffffff"},
    {name:"ぽこにゃん", id:"UCO06KZjWOe6b1tXrgzzakZA", twitterId:"pokonyan1185", twitchId:"", tiktokId:"", instaId:"", discordUrl:"", color:"#00ff00"},
    {name:"KtR（こーたろー）", id:"UCuJVrV6spfu9QUP6Wr4fugA", twitterId:"HAOKtR", twitchId:"", tiktokId:"", instaId:"", discordUrl:"", color:"#3399ff"}
];

let channels = [];
let reservedVideos = JSON.parse(localStorage.getItem('reserved_videos') || '[]');
let timeLeft = 600;

function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme');
    const target = current === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', target);
    localStorage.setItem('theme', target);
}

function init() {
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);

    const saved = localStorage.getItem('custom_channels');
    channels = saved ? JSON.parse(saved) : [...defaultChannels];

    new Sortable(document.getElementById('allGrid'), {
        animation: 150,
        ghostClass: 'sortable-ghost',
        onEnd: function() {
            const newOrder = [];
            document.querySelectorAll('#allGrid .card').forEach(el => {
                const id = el.getAttribute('data-id');
                const ch = channels.find(c => c.id === id);
                if (ch) newOrder.push(ch);
            });
            channels = newOrder;
            localStorage.setItem('custom_channels', JSON.stringify(channels));
        }
    });

    loadPortal();
}

async function loadPortal() {
    if (channels.length === 0) return;
    const channelIds = channels.map(c => c.id).join(',');

    try {
        const chRes = await fetch(`https://www.googleapis.com/youtube/v3/channels?key=${API_KEY}&id=${channelIds}&part=snippet`);
        const chData = await chRes.json();
        const chInfoMap = {};
        chData.items?.forEach(i => chInfoMap[i.id] = { icon: i.snippet.thumbnails.medium.url });

        const playlistResults = await Promise.all(
            channels.map(ch => {
                const pId = ch.id.replace(/^UC/, 'UU');
                return fetch(`https://www.googleapis.com/youtube/v3/playlistItems?key=${API_KEY}&playlistId=${pId}&part=snippet&maxResults=1`)
                    .then(r => r.json()).then(data => ({ chId: ch.id, data }))
                    .catch(() => ({ chId: ch.id, data: null }));
            })
        );

        const videoIds = playlistResults.map(r => r.data?.items?.[0]?.snippet.resourceId.videoId).filter(Boolean);
        const vRes = await fetch(`https://www.googleapis.com/youtube/v3/videos?key=${API_KEY}&id=${videoIds.join(',')}&part=snippet,liveStreamingDetails`);
        const vData = await vRes.json();

        vData.items?.forEach(v => {
            if (v.snippet.liveBroadcastContent === 'live' && reservedVideos.includes(v.id)) {
                NOTIFY_SOUND.play().catch(() => {});
                new Notification("配信開始！", { body: v.snippet.channelTitle + "さんが配信を開始しました" });
                reservedVideos = reservedVideos.filter(id => id !== v.id);
                localStorage.setItem('reserved_videos', JSON.stringify(reservedVideos));
            }
        });

        renderGrids(chInfoMap, vData.items || []);
    } catch (e) { console.error(e); }
}

function renderGrids(chInfoMap, vItems) {
    let htmls = { live: "", upcoming: "", all: "" };
    let counts = { live: 0, upcoming: 0 };

    channels.forEach(ch => {
        const chInfo = chInfoMap[ch.id];
        if (!chInfo) return;
        
        const lastV = vItems.find(v => v.snippet.channelId === ch.id);
        const status = lastV?.snippet.liveBroadcastContent || 'none';
        const isLive = status === 'live';
        const isUpcoming = status === 'upcoming';
        const isReserved = reservedVideos.includes(lastV?.id);

        let timeStr = "OFFLINE";
        if (isLive) timeStr = escapeHtml(lastV.snippet.title);
        else if (isUpcoming) {
            const d = new Date(lastV.liveStreamingDetails.scheduledStartTime);
            timeStr = `🕒 ${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}～`;
        }

        const safeTkId = ch.tiktokId ? (ch.tiktokId.startsWith('@') ? ch.tiktokId : '@' + ch.tiktokId) : '';

        const media = (isLive || isUpcoming)
            ? `${isLive ? '<div class="live-badge">LIVE</div>' : ''}<img class="thumb" src="${lastV.snippet.thumbnails.medium.url}">`
            : `<div class="thumb-bg" style="background:${ch.color}"></div><img class="thumb-profile" src="${chInfo.icon}">`;

        const card = `
        <div class="card ${isLive?'is-live':''}" data-id="${ch.id}">
            <button class="delete-btn" onclick="deleteChannel('${ch.id}')">×</button>
            <a href="https://youtube.com/watch?v=${lastV?.id || ''}" target="_blank" style="text-decoration:none; color:inherit;">
                <div class="thumb-wrap">${media}</div>
                <div class="info">
                    <div class="name" style="color:${ch.color}">${escapeHtml(ch.name)}</div>
                    <div class="title">${timeStr}</div>
                </div>
            </a>
            <div class="btn-area">
                <a href="https://youtube.com/channel/${ch.id}" target="_blank" class="btn btn-yt">YouTube</a>
                ${ch.twitterId ? `<a href="https://x.com/${ch.twitterId}" target="_blank" class="btn">X</a>` : ''}
                ${ch.twitchId ? `<a href="https://twitch.tv/${ch.twitchId}" target="_blank" class="btn btn-tw">Twitch</a>` : ''}
                ${ch.tiktokId ? `<a href="https://tiktok.com/${safeTkId}" target="_blank" class="btn btn-tk">TikTok</a>` : ''}
                ${ch.instaId ? `<a href="https://instagram.com/${ch.instaId}" target="_blank" class="btn btn-ig">Insta</a>` : ''}
                ${ch.discordUrl ? `<a href="${ch.discordUrl}" target="_blank" class="btn btn-dc">Discord</a>` : ''}
                ${isUpcoming ? `<button class="btn btn-reserve ${isReserved?'active':''}" style="grid-column:span 2" onclick="toggleReserve('${lastV.id}')">${isReserved?'🔔 予約中':'🔔 通知予約'}</button>` : ''}
            </div>
        </div>`;

        if (isLive) { htmls.live += card; counts.live++; }
        else if (isUpcoming) { htmls.upcoming += card; counts.upcoming++; }
        htmls.all += card;
    });

    document.getElementById("liveSection").style.display = counts.live ? "block" : "none";
    document.getElementById("liveGrid").innerHTML = htmls.live;
    document.getElementById("upcomingSection").style.display = counts.upcoming ? "block" : "none";
    document.getElementById("upcomingGrid").innerHTML = htmls.upcoming;
    document.getElementById("allGrid").innerHTML = htmls.all;
}

function addChannel() {
    const getVal = id => document.getElementById(id).value.trim();
    const name = getVal('new-name'), id = getVal('new-id');
    if (!name || !id) return;
    channels.push({
        name, id, twitterId: getVal('new-twitter'), twitchId: getVal('new-twitch'),
        tiktokId: getVal('new-tiktok'), instaId: getVal('new-insta'),
        discordUrl: getVal('new-discord'), color: document.getElementById('new-color').value
    });
    localStorage.setItem('custom_channels', JSON.stringify(channels));
    location.reload();
}

function deleteChannel(id) {
    if (confirm("削除しますか？")) {
        channels = channels.filter(c => c.id !== id);
        localStorage.setItem('custom_channels', JSON.stringify(channels));
        loadPortal();
    }
}

function resetChannels() {
    if (confirm("リセットしますか？")) {
        localStorage.removeItem('custom_channels');
        location.reload();
    }
}

function toggleReserve(id) {
    if (Notification.permission !== "granted") Notification.requestPermission();
    const idx = reservedVideos.indexOf(id);
    if (idx > -1) reservedVideos.splice(idx, 1);
    else reservedVideos.push(id);
    localStorage.setItem('reserved_videos', JSON.stringify(reservedVideos));
    loadPortal();
}

async function manualRefresh() {
    const btn = document.getElementById('refresh-btn');
    btn.disabled = true;
    await loadPortal();
    timeLeft = 600;
    btn.disabled = false;
}

setInterval(() => {
    timeLeft--;
    if (timeLeft < 0) { loadPortal(); timeLeft = 600; }
    const m = Math.floor(timeLeft/60), s = timeLeft%60;
    document.getElementById('timer').innerText = `Next Update: ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    document.getElementById('progress-bar').style.width = (timeLeft/600)*100 + "%";
}, 1000);

init();
</script>
</body>
</html>
